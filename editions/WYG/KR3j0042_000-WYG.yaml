  - {type: page-break, offset: 0, content: '', id: KR3j0042_WYG_000-1a, image: WYG0852/WYG0852-0411a.png}
body:
  text: 甕牖閒評雜家類二雜考之屬提要臣等謹案甕牖閑評八卷宋史藝文志及晁公武陳振孫諸家俱未著録惟李燾續通鑑長編考異内間引其書明代文淵閣書目亦有此書一部一册而均未詳姓名時代永樂大典散載入各韻中亦不題撰人今考袁燮絜齋集有所作其父墓表云先公諱文字質甫四明鄞人㓜喜讀書不汲汲於科名而惟務勤學有襍著一編曰甕牖閒評又燮集載其曽祖知隨州曽祖妣石氏臂痛其祖延醫修佛及其父諸軼事皆與是編所紀相合則為袁文所撰無疑也其書専以考訂為主於經史皆有辨論條析同異多所發明而音韻之學尤多精審凡偏旁㸃畫反切訓詁悉能剖别於毫釐疑似之間其所載典故事實亦首尾完具往往出他書所未備雖徴引既繁不無小誤如謂漢書叙傳稱袁盎為子絲疑傳中字絲為脱文不知叙傳以四言為句故加子字以成文如史記項羽本紀稱字羽而自叙亦作子羽是其例也又謂古詩日暮倚修竹佳人殊未來所稱佳人乃賢人考日暮倚修竹乃杜甫佳人詩云非婦人已謬佳人殊未來乃江淹擬休上人怨别詩合為一篇尤非至於不知腹猶果然出莊子不知䑕姑為牡丹不知屠蒯杜蒯乃聲之轉如包胥之為勃蘓亦均失之眉睫之前而大致該洽實考据家之善本惜其在宋世已罕流傳迄明遂佚藏書家至不能舉其名又文之子燮孫甫史皆有傳而獨不及文其行事亦幾不可考今幸從沉埋剥蝕之餘復加釐訂排比成編使其姓名學問不致終没於來世亦可知顯晦之自有其時矣原書卷帙不可考今所輯者尚四百餘則條目頗為紛襍謹依類詮次分為八卷一卷論經二卷論史三卷論天文地理人事之類四卷専論小學五卷論詩詞書畫之類六卷論飲食衣服器用宫室之類七卷論釋道技術物産之類而以襍論因果怪異及自記之語終焉乾隆四十三年八月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書子部十甕牖閒評目錄雜家類二雜考之屬卷一五十三條卷二五十一條卷三四十九條卷四五十條卷五五十四條卷六五十三條卷七五十四條卷八四十八條
