body:
  text: 甕牖閒評卷六宋袁文撰劉夢得茶詩云自傍芳叢摘鷹觜斯須炒成滿室香以此知唐人未善啜茶也使其見本朝蔡君謨丁謂之製作之妙如此則是詩當不作矣夫旋摘之茶必香其香當倍于常茶非龍麝之比也古人入茶有用龍麝者其壊茶為不少茶有自然之香其何假于龍麝乎黄太史詩云要及新香碾一杯不應傳寳到雲來是知茶之新者其香尤可愛也劉夢得茶詩云山僧後簷茶數叢春來映竹抽新茸宛然為客振衣起自傍芳叢摘鷹觜斯須炒成滿室香便酌砌下金沙水驟雨松聲入鼎來白雪滿盌花徘徊此乃詠煮茶也北人皆如此迨今猶然香彎類藁云觀此詩自摘至煎則便飲之初無焙造碾羅之事雖曰茶芽不知争得入口豈亦如藥之㕮咀去其滓而飲之乎香彎蓋南人未知煮茶耳白樂天茶詩云渴嘗一盞緑昌明昌明乃地名在綿州人便謂昌明茶緑非也此正與黄金碾畔緑塵飛之句相似蓋是時未知所以造茶制作不精故茶之色猶緑而好事者録其茶之妙亦未以白色為貴其詩故如此使樂天見今日之茶之美而肯為是語耶自唐至宋以茶為寳有一片值數十千者金可得茶不可得也其貴如此而前古止謂之苦荼以此知當時全未知飲啜之事蘓東坡詩所謂茗飲出近世者不可謂無所本也余生漢東最喜啜畾茶閒時常過一二北人知余喜啜此則往往煮以相餉未嘗不欣然也其法以茶芽盞許入少脂麻沙盆中爛研量水多少煮之其味極甘腴可愛蘇東坡詩云柘羅銅碾棄不用脂麻白土須盆研者是矣而東坡詩又云前人初用茗飲時煮之無問葉與骨茶録中亦載茶古不聞食晉以降吳人採葉煮之號茗粥則知畾茶者自晉蓋有之矣非復今之人始食也東坡詩又云食罷茶甌未要深後人便謂食罷未可啜茶引東坡此詩以為證而不知東坡且欲睡耳故其詩下句云春風一榻值千金也古人客來㸃茶茶罷㸃湯此常禮也近世則不然客至㸃茶與湯客主皆虚盞已極好笑而公廳之上主人則有少湯客邊盡是空盞本欲行禮而反失禮此尤可笑者也今人造酒用秫一斗而下水五升遂可取酒一斗是酒常酒也或有欲得佳者只下水三升得酒七八升而已觀漢書平當傳註云稻米一斗得酒一斗為上尊尚未為佳酒也龐安常傷寒論云屠蘇平屋也可以禦風寒則歲首屠蘇酒亦取其禦風寒而已今人遺酒必以四尊而謂之乘壺者蓋馬四匹為乘故酒四尊借以為乘焉無他意義聊以為戲而已瓻酒器古之盛酒以遺借書者也故古語云借一瓻還一瓻然唐韻云瓻大者一石小者五斗如此則以書借人者得酒甚多余家貧常苦無酒雖不善劇飲而每欲以飲客今當廣置書以借人若時得數瓻以為用顧不美耶但恐今人非古人雖借書而酒不可得也今人盛酒大瓶謂之京瓶乃用京師京字意謂此瓶出自京師誤也京字當用經籍之經字普安人以瓦壺小頸環口脩腹受一斗可以盛酒者名曰經則知經瓶者當用此經字也杜陵詩云飯抄雲子白蓋謂飯可以比雲子之白也至後世則便以飯為雲子故唐子西詩云雲子滿田行可擣又汪彦章詩云秋來雲子滑流匙更不究雲子為何物見杜工部有飯抄之句竟指飯為雲子也然雲子乃神仙之食出漢武外傳中又詩云漁梁曬趐滿烏鬼則又以烏鬼為鸕鷀亦縁工部詩有曬翅滿漁梁之句也且鸕鷀非是烏鬼沈存中已竊笑之所謂白差烏鬼作鸕鷀者為此耳然則雲子亦是白差矣束晳餅賦云春饅頭夏薄持秋起搜冬湯餅四時皆宜惟牢九乎初不知牢九是何物後讀蘇東坡詩云豈惟牢九薦古味要使眞一流天漿雖東坡殆亦未知牢九果何物耳案蘇軾遊博羅香積寺詩自注束晳餅賦饅頭薄持起搜牢九而賦彚載束晳餅賦薄持作薄壯起搜作起溲牢九作牢丸殆傳本各異此條則仍軾注而載之黍稻與麥不同蘇東坡集云黍稻之出穗也必直而仰其熟也必曲而俯麥則反是博雅云蕒音巨也非是所謂蕒者即今之苦馬殆語訛耳則别是一種菜世稱為銀條菜者是與苦馬絶不相類豈博雅不詳審而誤以為一物耶緗素雜記云蘆菔江東人謂之菘菜蘆菔乃是今之蘿蔔與菘菜全不相類江東人無緣以為一物豈亦緗素不詳審而強名之也蘇東坡一帖云予少嗜甘日食蜜五合嘗謂以蜜煎糖而食之可也又曰吾好食薑蜜湯甘芳滑辣使人意快而神清其好食甜可知至别子由詩云我欲自汝隂徑上潼江章想見冰盤中石蜜與糖霜嗜甘之性至老而不衰其見于篇章者如此字書酢乃醋字世作酬酢之酢非也今按匡謬正俗注云酢菜酢音倉故切東軒手抄云北方頗貴土人以糖酢漬之又云儋耳食無果麵醤酢黄太史謝張泰伯惠黄雀鮓詩云蜀王煎藙法醯以羊彘兔麥餅薄于紙合醬和醎酢是皆作醋字用也游酢酢字前輩作醋字用東軒手抄云酢藏不如蜜漬是已近與一僧偶及此云今游酢寺中最使得著卻是油醋也僧為大笑徽宗朝蔡京諸公用事四方饋遺皆充牣其家入上方者纔十一京家令㸃檢蜂兒見在數目得三十七秤王黼家黄雀鮓自地至棟者凡滿三楹事見曲洧舊聞梁師成家一日人惠牛酥一百觔事見漫録其奢縱如此以是知前代有胡椒八百斛如元載者蓋不足云也漢承秦之後卿大夫尚服皁衣故張敞議云臣備皁衣二十餘年谷永書云擢之皁衣之吏以見當時尚服皁衣也然夏侯勝云取青紫如俛拾地芥者蓋漢時丞相太尉皆金印紫綬御史大夫銀印青綬此三公極崇之官顔師古註遂謂青紫為卿大夫之服夫師古豈不知當時尚服皁衣而未有青紫也何繆誤乃爾耶今之紫衫下吏之服也自南渡以前士大夫燕服止是冠𢃄惟下吏便于趨走則服紫衫既而金人南下兵革擾攘以冠帶不甚輕便士大夫亦盡服紫衫且欲便事不以為非也迨紹興末有臣僚上言今天下承平而百官如擾攘時常服紫衫不稱于是朝廷之上郡縣之間悉改服涼衫純白之衣未幾顯仁升遐亦其驗已又有臣僚上言涼衫近喪服不可用仍合只用紫衫故至今皆服而不疑天下事固有循習之乆而不可改者如本朝衣制亦嘗屢更矣獨恨前後臣僚既言紫衫涼衫不可用而略無一言仍用冠帶坐使承平之風不復見于後世豈不重可歎哉百餘年前士人乃服白襴袍鐡裹帶有一士人忽皁衫紗帽而出或怒曰汝為舉子安得為此下人之服事見畫墁集是時未重衫帶如此夫古之聖賢其遺像見于後世者不知幾何人然古人自有古人制度豈可與今人相似余嘗見世之塑廟神與夫畫王者從官形貌不問世之遠近其用幞頭者皆作横烏乃今之服制故未嘗不掩口竊笑以為循習之弊一至于此也古者三軍衣服上下皆如一為之主者不可以自表暴以防敵人之窺伺而已嘗笑王則之叛貝州也在軍中常裹花帽人見其花帽皆知其是則也至就擒花帽終不去身甚矣夫則之愚也蒼梧先生雜志云古者戎服上下一律皆重赤殆欲與殷輪釁鼓等色相亂戰陣之間不遽見傷殘以沮士氣故左氏傳有均服振振之語此説良是也國家自南渡前天下軍州戎服皆用緋余嘗親見之自紹興末年忽變為皁色用墨汁染成殊非古人之意略無一人以為非何哉本朝侍從以上得擊紅鞓帶自葉少藴始也國初未有繫紅鞓帶者滑州有賈魏公畫像其帶只是黒鞓曽見一士大夫云唐明皇畫像在潞州亦只是黒鞓𢃄至五代時𢃄始尚紅鞓者想是時人主已用之又未知果起于何代也夷堅乙志云鬼畏革帶非也鬼何由畏革帶夫人之死不繫革帶者蓋帶乃牛革為之不欲以人尸與牛革混雜耳而非畏革帶也嘉祐録載李汧公勉百衲琴用蝸殼作徽蝸殼豈堪作徽恐是螺殼傳寫之誤耳琵琶不謂之彈而謂之抹故王建詩云琵琶先抹緑腰頭白樂天詩云谷兒抹琵琶則知細抹將來正謂琵琶也棊至難事也而詠棊為尤難嘗觀杜牧之詩云羸形暗去春泉長猛勢横來野火燒劉夢得詩云雁行布陣衆未曉虎穴得子人方驚黄太史詩云心似蛛絲遊碧落身如螳殼化枯枝案螳殼黄庭堅集作蜩甲觀此三詩皆道盡棊中妙處殆不容優劣矣至王荆公蘇東坡則不然荆公之詩云戰罷兩奩収黒白一枰何處有虧盈東坡之詩云勝固忻然敗亦可喜優哉游哉聊復爾爾二詩理趣尤竒其見又髙于前三公也名紙古只謂之名案南史何思澄每宿昔作名一束曉便命駕朝賢無不悉狎投晩還家所齎名必盡以是知名紙古只謂之名也聞見後録載王荆公平生用一種小竹紙甚不然也余家中所藏數幅卻是小竹紙然在他處見者不一往往中上紙雜用初不曽少有揀擇荆公文詞藻麗學術該明為世所推重故雖細事人未嘗不記録之至于用紙亦然雖未詳審亦可見其愛之之篤也蘇東坡一日得麤紙一幅題云此紙甚惡止可鑱錢餉鬼而已余作字其上後世當有錦囊玊軸什襲之寵物之遇不遇蓋如此諸集中皆無書此一段者閒識之以補東坡遺事紙謂之箇亦謂之枚黄太史詩云為染藤溪三百箇歐陽文忠公詩云純堅瑩膩卷百枚今所謂邵公紙者乃龍圖學士公邵䶵知越州時作也余聞其姪孫箎言如此黄素細密上下烏絲織成欄其間用朱墨界行此正所謂烏絲欄也世稱銅雀硯殆用銅雀臺瓦為之也余觀武昌土俗編載安樂宫在吳王城中舊傳此宫中古瓦皆澄泥為之可作硯一瓦值錢一千文是知古瓦精緻如此不獨銅雀臺瓦可為硯也蘇東坡酷愛硯其在黄州五年黄州去武昌不遠略無一言及之前後好事者甚多亦無及此何耶豈東坡時吳宫古瓦猶未顯于世歟深所未喻也舊聞鳳咮龍尾硯至今人以為寳然苕溪漁隠載鳳咮乃建州鳳凰山土色膏腴特宜植茶石殊少亦頑燥非材也蘇東坡為人所紿故形之歌詠耳蘇易簡硯譜又載歙州龍尾山雖有其名而山實無石蓋好事者取其美名以咤于世耳且以鳳咮龍尾其名亦可謂著矣見于議論形之篇什者甚多若據此二書則皆以為無有不知今所謂鳳咮龍尾者果出于何地以是知天下之事其可盡信乎研墨所貴無聲不可不知也蔡君謨詩云玊質純全理緻精鋒鋩都盡墨無聲黄太史詩云但見受墨無聲松花發是矣余觀嬾眞子録載古筆多用竹如今所用木斗竹筆故其字從竹又攷楊文公談苑云西域僧覺以竹筆作梵書横行數十字信知竹筆亦可以書字矣豈自古如此而西域之人至今不變歟古者椀楪以木為之故椀楪字皆從木針指二字本俗語夷堅乙志採而用之亦自不惡也其記婺州民女書云夜與母共寢晝則作針指于牖下西溪叢話載南人不善乘船謂之苦船北人不善乘車謂之苦車苦音庫而浙人乃云注船注轎子是亦苦船苦車也然二字其義皆不可曉以其音相近故知其意則同世謂投子六隻為渾花五代史載劉信一擲遂成渾化正謂投子也化字亦有理第世俗訛為花字耳又博家以一二三四五六投子為浮圖何也浮圖乃塔耳舊聞張山人浮圖詩云浮圖好浮圖上頭細了下頭麤借此名以名投子者豈亦以一二三四五六為自細至麤如浮圖之狀也歟器皿人多云受用其實名售用談苑云吳越王錢俶以妃平生售用凡百箱賜孫承祐承祐蓋妃之弟也今人呼庭宇院宇宇下乃易所謂上棟下宇者宇下屋檐是也見左氏傳正義廳後屋人多呼為主廊其實名貯廊澠水燕談云是時㑹議于玊堂後貯廊人或疑蘇東坡以思無邪三字名齋此自古有之不足異也古有益延壽三字名館獅子吼三字名寺是也取明隔子人多呼為亮隔夷堅志乃云廊上列水盆帨巾堂壁皆金漆凉隔子又卻用此凉字作平聲敖乃地名秦以敖地為倉故爾今所在竟謂倉為敖蓋循習之誤唐書裴耀卿傳云東幸就敖粟楊文公談苑亦云此寺前朝廢為倉敖皆以倉為敖者抑豈循習之故歟趙明誠金石録云唐朝有大雲寺至明皇時乃改為開元寺然余觀黄太史題跋有云紹聖五年五月晦避暑瀘州大雲寺又不知此大雲寺者何寺也豈亦唐朝大雲寺而仍有不曽改為開元寺者乎舊傳相國寺有十絶余攷能改齋漫録所載相國寺舊榜太宗御書此十絶之一也又攷談叢所載相國寺樓門唐人所造木工喻浩曰他皆可能惟卷簷門内兩井亭近代木工不能及也寺之十絶此其二也是與太宗御書為三絶也第未知彼七絶為何物耶然本朝名畫人氏云大相國寺碑稱寺有十絶大殿内彌勒聖容乃唐中宗朝僧惠雲于安業寺鑄成光照天地為一絶睿宗親感夢于延和元年七月二十四日改舊相國寺為大相國寺御題牌額為二絶王温重裝聖容金粉肉色并門外善神為三絶大殿内有吳道子畫文殊維摩像為四絶供奉李秀刻佛殿障日九間為五絶明皇天寳四載令邊思順修建排雲寳閣為六絶石抱玊畫䕶國除灾患變相為七絶明皇敕車道政依于闐國傳樣畫北方毗沙門天王為八絶環師畫梵王及東廊障日内畫法華經二十八品功德變相為九絶西庫北壁僧智儼畫三乘國因果入道位次圖為十絶又卻引此為十絶未知是否余向過江隂見一路中寺舍亭館題梁往往多錯者且如紹熙元年二月十五日建則當云歲次庚戌二月乙酉朔十五日己亥是也歲次固不容錯二月卻書其月建作己卯歲次既是庚戌則月建己卯不言可知何待復記耶惟日則懼有參差故先書二月乙酉朔然後知十五日己亥無疑矣每與親舊觀之未嘗不笑其疎謬有如此者甕牖閒評卷六
