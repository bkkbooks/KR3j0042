body:
  text: 甕牖閒評卷二宋袁文撰人謂蕭何識韓信為知人然何初見漢高祖乃云劉季固多大言少成事何尚不識高祖則識韓信亦偶然耳未足為竒也史記李斯上書諫二世其略云田常為簡公臣布惠施德下得百姓上得羣臣陰取齊國殺宰予于庭是宰予不從田常為常所殺也弟子傳乃云宰予與田常作亂而滅其族孔子恥之蘇東坡作志林力辨此一段事謂李斯荀卿去孔子不逺宜得其實弟子傳妄也東坡之意葢欲明宰予之非與田常作亂是固然矣然不知宰予未嘗被殺齊田常之亂所殺者乃闞止與宰予皆字子我太史公取左氏傳而作史記見子我被殺不能深䆒便認以為宰予而有孔子恥之之説抑何謬誤至于如此夣固有足徵者殷高宗之夢傅説是也若漢文帝之夢鄧通豈其然乎通乃幸臣文帝欲貴之而恐羣臣力爭故托諸夢以為辭聊以掩一時之口耳項梁既追章邯邯兵益盛項梁使使趣田榮共擊之榮曰楚殺田假趙殺田角田間乃發兵梁曰田假與國之王窮來歸我不忍殺此漢書項籍傳所載也至田儋傳則載楚懷王曰田假與國之王窮而歸我殺之不誼一傳以為項梁一傳以為楚懷王未知孰是漢高帝初起野戰喪皇妣于黄鄉後不免招魂以葬遂諡為昭靈夫人此高帝即位之五年也至吕后七年從丞相平之請于是尊昭靈夫人為昭靈皇后班固漢書載之甚詳而三國志蜀甘后傳云昔高皇帝追尊太上昭靈夫人為昭靈皇后乃以為封皇后在高帝之時何不同如此也疑三國志中有誤當更攷之吳王濞年二十以騎將從破黥布軍是時荆王劉賈為布所殺無後乃立濞為吳王已拜受印高祖召濞相之曰若狀有反相漢後五十年東南有亂豈若耶然吳王反時年六十二當云漢後四十年可也顔師古解漢書庸奴其夫謂不恃賴其夫視之若庸奴攷史記張耳傳云外黄富人女甚美嫁庸奴亡其夫去抵父客然則庸奴乃是人名非鄙視之如庸奴也漢書劉向傳云周章百萬之師至其下矣周章何得有百萬之師若以陳勝傳攷之周文陳賢人即周章也自言能習兵勝與之將軍印西擊秦行收兵至闗車千乗卒十萬至戲軍焉而已不聞有百萬之師疑十字誤為百字揚子雲法言云徵先生于齊魯所不能致者二人若以漢書叔孫通傳攷之止云魯有兩生不肯行而云齊魯者承上文齊魯大臣之語疑後人添一齊字也漢書鼂錯傳此將不省兵之禍也今諸本皆作禍字余謂此禍字當是過字葢前云此不習勒卒之過也此二過字皆同必無別用禍字之理鼂錯誅死洪景盧作容齋隨筆謂其父母妻子同産無少長皆棄市然本傳載錯父聞錯所更令三十章諸侯讙譁遂從潁川來飲藥而死曰吾不忍見禍逮身則錯父初不曽棄市也洪説誤矣史記黎明二字漢書作遲明遲訓待待明而後為也若黎明則不然黎訓雜乃黑白未分之時殆天欲明未明之間耳猶之黎民其頭半白半黑故曰黎解漢書遲明二字而引史記所謂黎明者云亦徐緩之意則非也過當過字今人皆作去聲然史記衞青傳用過當二字過字乃音平聲過從過字今人皆作平聲然張不疑詩憶昔荆州屢過從過字乃音去聲漢書項籍傳贊載賈生過秦論云卒起阡陌之中陌字讀者往往皆作錢陌之陌然顔師古不音又史記或作千百以是知本是千百字漢書借為阡陌止合作如是讀也往來二字一體也安有往字從彳而來字不從彳者彳行字之省文耳來字若不從彳乃是來牟之來雖曰來字非往來之來也漢書云氐羗徠服又云天馬徠從西極用此徠字極是夫古人制字未嘗無義皆為後世所更變遂不容稽攷非古人之過也史記漢書肺腑二字亦有作肺附者古人多假借用字葢喻親族猶人之有肺腑常相依者也註家不能深攷其義乃妄為解釋遂有肝肺相附之説余謂作附處下當云附讀與腑同而徐廣註史記卻于腑字下音為附字殊非作史者之意耳班馬字類上聲稟字下從禾又有禀字下從示于從禾稟字下云史記禮書不稟京師于從示禀字下云漢書西域傳須諸國禀食余疑不稟京師當從示作禀字須諸國禀食卻當從禾作稟字恐是其錯誤也奉朝請請音去聲葢漢書所謂春見曰朝秋見曰請顔師古音之甚詳蘇東坡作送程建州詩云會看金花詔湯沐奉朝請乃于永字韻押恐誤因思今之官制有所謂朝請郎朝請大夫者請字皆合音才性切而今之人止作上聲用何也漢書要與約同故要多音約高祖紀云諸侯至而定要束耳此要字合音約顔師古不音誤也婁機作班馬字類便入在三蕭韻内以為邀字亦誤矣物故者其説甚多或云人死則為物非也漢書蘇武傳云前以降及物故凡隨武還者九人宋祁謂物音殁極是葢本是殁字借用物字何勞異説耶漢書魁梧二字梧字音去聲陳子高詩云樓下旌旗五丈餘府中賢尹計魁梧梧字乃押作平聲今人呼厮兒厮作入聲漢書厮字本音斯取薪者也漢書地理志大即要字也與陳咸傳云大要教咸諂爾之要同顔師古于字下音一遥反而班馬字類遂收入蕭字韻内豈其誤耶長者葢惇厚之稱初不間男女也今人皆呼男子為長者漢書云為其母不長者則知女子亦可以稱長者矣唐子西作淮陰婦墓誌云天下不多客之賢而多婦人長者有知識豈亦是此意耶韓退之有讀書城南詩云少長聚嬉戲少音始紹切葢謂稍長時也亦猶漢書戾太子傳云少壯詔受公羊春秋註少壯言漸長大也故其上句云兩家各生子孩提巧相如人多讀作去聲者非是又匈奴傳云少長則射狐兔而其上文亦云兒能騎羊引弓射鳥䑕則知少長正是稍長時也若左氏傳所謂少長有禮與夫少長于君此少字卻當音失照切漢書濟北王興居反詔曰與王興居去來者亦赦之三劉釋云高帝詔曰與綰居去來歸者赦之今此文當云與王興居居去來者赦之葢脱一居字也余謂若依高帝之詔則當云與王興居居去來歸者赦之又脱一歸字也漢書爰盎本傳字絲而敘傳乃云子絲慷慨疑本傳脱子字漢書于定國傳云決疑平法務在哀鰥寡竊謂哀鰥寡三字本意止是哀矜矜字多借用鰥字故曰務在哀鰥後人不知鰥字乃矜字且謂經史中無有獨用鰥字者遂増一寡字作鰥寡耳許慎註淮南子云楚人謂袍為裋説文云粗衣廣韻敝衣襦也荀子乃作豎褐者疑借豎字耳而註家便解為僮豎之豎乃云僮豎之褐漢書裋褐不完註家亦云裋者僮豎所著布長襦也承荀註之誤耳漢書趙禹傳云公卿相造請禹終不行報謝務在絶知友賓客之請其意葢謂禹凡有造請者禹不報謝務在絶人故也顔師古卻于不行字下註斷報謝乃屬下文又註云以此告報公卿殊不可解宋景文筆記辨漢書黄霸傳鶡雀二字云顔師古本解作雀官本誤以為鳻雀耳且鳻乃鳥聚貌非鳥名也此説良有理以余觀之恐非官本之誤何以知其然葢玉篇云鶡音何葛切鳥似雉而大青色有毛角鬬死而止又云鳻音扶云切鳻雀似鶡玉篇見漢書註有此鳻字故出此鳻字玉篇葢唐人作以是推之則自唐以來已自作鳻字矣初非官本之誤也人主好尚不可不謹也嘗疑漢宣帝時祥瑞不應如是之多及觀黄霸傳以鶡雀為神爵霸乃便稱祥瑞非張敞力辨其非是則宣帝又以為然以是知當時祥瑞其真偽葢不可知不宜如是之多也漢書景帝召程姬姬有所避而飾侍者唐兒使夜進上醉不知以為程姬而幸之遂有身已乃覺非程姬也及生子因名曰發立為長沙定王以其母㣲無寵故王卑溼貧國註云後二年諸王來朝有詔更前稱壽歌舞定王但張褏小舉手左右笑其拙上怪問之對曰臣國小地狹不足囘旋帝乃以武陵零陵桂陽益焉蘇東坡作趙伯成母生日致語口號斷句云願得唐兒舞一曲莫嫌國小向長沙舞者乃長沙王發非唐兒亦東坡錯誤也漢書李延年侍上起舞歌曰北方有佳人絶世而獨立一顧傾人城再顧傾人國寧不知傾城與傾國佳人難再得上曰世豈有此人乎平陽主因言延年有女弟上召見之實妙麗善舞由是得幸註云非不吝惜城與國但以佳人難得愛悦之深不覺傾覆余謂此説非也所謂傾城與傾國者葢一城一國之人皆傾心而愛悦之非謂佳人解傾人城傾人國也若果解傾人城傾人國武帝雖甚昏蒙其敢求之耶且延年者亦曉人方欲感動其君故諄諄及之而其言乃險巇如此其欲人君之聽也難矣將何以成事乎故余謂延年之言必不然乃解註者之失也唐劉夢得牡丹詩云惟有牡丹真國色花開時節動傾城若盡依註者之言則牡丹亦解傾人之城也顔師古解漢書陸賈傳箕踞二字云伸兩腳而坐其説非也箕踞者乃抱兩膝而坐耳唐子西作箕踞軒記云箕踞者山間之容也拳腰聳肩抱膝而危坐傴僂跼蹐其圓如箕故古人謂之箕踞此狀箕踞良是豪氂二字漢書云度長短者不失豪氂註云豪兔豪也十豪為氂後漢書岑熙傳云足下生氂正用此氂字然則氂亦豪也葢豪之粗者故有十豪為氂之説而今人豪氂字乃用此毫釐字何耶漢書班婕妤傳云哀襃閻之為郵顔師古註云郵讀曰尤尤過也余謂合用此尤字乃借用郵字耳與成帝紀以顯朕郵之郵同只作郵讀與尤同便得何勞作過解耶鰒魚倭螺也今漢書王莽傳載莽亶飲酒啖鰒魚註云海魚也恐顔師古未必知是倭螺耳後漢書馬援傳有冘豫二字註云冘音以林反恐當時只是猶字借用尤字耳傳寫之錯致章懷誤音也班固謂向歆父子有異同之論以其學之不同也然向當成帝時王氏專權書凡四五上既作洪範五行傳奏之又引齊田氏魯季孫之徒反覆辨論推衍徵驗勤勤懇懇無所不至未嘗不欲救漢家之禍而抑王氏之權也至歆則不然方且與甄豐王舜輩為莽腹心倡𨗳在位襃揚功德卒成篡奪之禍迨其末年聽王涉語雖欲與董忠及其子伊休侯同心合謀共劫持之吁亦晚矣適足以殺其軀而已矣由是觀之則所謂父子有異同之論者葢不止于學也西漢王嘉減法律盛德事也班固漢書不載乃見之東漢梁統傳中統因勸光武嚴刑而及此決非妄言況班固又在其後當以統言為據今州縣皆立臯陶廟以時祀之葢臯陶理官也州縣獄所當祀者泊宅編謂後漢以來始有之攷范滂傳坐繫黄門北寺獄獄吏謂曰凡坐繫皆祭臯陶滂曰臯陶賢者古之直臣知滂無罪將理之于帝如其有罪祭之何益衆人由此亦止夫滂既不曽祭則亦未可據以為始此也使事而不知其義未可輕用也頓挫猶言抑揚耳故後漢書孔融贊云音情頓挫是矣一士人謝及第啓云頓挫場屋比幸塵忝頓挫乃作摧挫解則非抑揚也去字若作起吕切字書訓藏晉書云阿堵物去與漢書去草實而食之是已鞋韈以革為之故字並從革傳曰韈而登席則屨有韈矣史曰張釋之為王生結韈傳曰文王左右無結韈之士則韈有繫矣梁天監間尚書參議案禮跣韈事由燕坐今則極敬之所莫不皆跣清廟崇嚴既絶恒禮凡有屨行者應皆跣韈葢是時有不跣韈者故議者及之唐史則天武氏自制十有二字曌照天埊地日囝月星君􅖔臣吹載年正而則天自名曌且則天取古已制之字而改易之意者古人制字未盡善耶亦可謂贅矣案集韻載則天自制者十有八字于唐史十有二字之外復有六字如人字圀國字之類皆見于當時薛稷所書之碑則知則天所制者不止十有二字此學林之文也余又攷東觀餘論跋華嚴經一段乃云唐史載武后作十二字此卷復有證聖等字蓋當時制作不特十二字而已以是而言則武后自制之字其數固不可知得非唐史所載者果有未盡乎唐太宗既得有一女子身姓武之讖知其後唐室必亂故以疑似而殺李君羨而不知所以亂唐室者乃在以李勣遺高宗也其後高宗欲立武昭儀為后羣臣皆以為不可獨勣曰此陛下家事何須問外人帝意遂決竟成武氏之禍唐室㡬亡者數四夫太宗非不聰明非不欲弭異日之患而禍機之伏乃屬自貽其後如此嗚呼夫豈人謀也哉非天其孰使之首鼠猶言進退耳唐書郭子儀傳云孽寇首鼠是矣一士人與朋舊書云滯留上國首鼠六年乃作首尾解則非進退之謂也孿雙生子也唐書王仁皎子守一與明皇廢后孿生是矣孿音所眷切侯鯖錄云㝈子之相似正謂雙生而又作此㝈字未知孰是唐李錡之死也二婢配掖庭其一曰鄭則幸於憲宗是生宣宗後乃為皇后此全與柴翁之女相似魏人柴翁之女初備唐莊宗掖庭明宗入雒遣出父母往迎之至鴻溝遇雨甚踰旬不進其女曰兒見溝旁郵舍隊長黝色花項者乃極貴人願事之即郭威葢周祖也亦竟為皇后夫二婦人之命初亦榮矣既而皆遇禍變㡬不免其身然未㡬卒貴如此亦可謂異人也唐之亡也楊渉為押國璽使其子凝式時見直史館謂涉曰大人為唐宰相而國家至此不可謂之無罪況手持天子璽綬與人雖保富貴奈千載何盍辭之渉大駭云汝滅吾族神色為之不寧者數日夫凝式出此言亦可謂賢矣不得謂唐季之無人也為史者自當表而出之使其忠誠少見於後世而歐陽公作五代史略不為一言何哉若謂無此事耶今資治通鑑載之為甚詳此余之所不可曉者而五代史又云凝式厯事梁唐晉漢周以心疾致仕居于洛陽謂凝式有心疾亦非也凝式當離亂之時姑托此以全身逺害而已使果有心疾其能勸父涉辭押國璽使之命乎東觀餘論以凝式終太子太傅而五代史乃云終太子太保未知孰是甕牖閒評卷二
