body:
  text: 甕牖間評卷三宋袁文撰世言牽牛織女故老杜詩云牽牛出河西織女處其東然織女三星自在牽牛之上主金帛非在東也二星既皆在西則世俗鵲橋之説益誕矣而老杜詩又云牛女年年渡何曽風浪生殆見人言紛紛聊以為戲耳凡龍之有翼者曰應龍見東觀餘論故曰應龍之興雲霧滃然而隨遁齋間覽載閩中泉福興化三州瀕海每嵗七八月多東北風俗號癡風亦名為報風此説妄也余鄉常有颶風但初來聲勢頗惡與三州不異人家即曰報起矣有頃則亦蜚瓦拔木無所不至所謂報起者即颶風也第其名不同耳初不見有東北風遁齋泥報字遂有報風之説以余鄉之事觀之則遁齋之言為無據矣夏間久旱四方不免祈求而雨隨至者多是龍捲江河之水而上非陰陽交感而成也觀徽宗政和七年夏大雨有二魚落殿中省廳屋上其事見國史後補雨中那得有魚此雨是江河之水為龍所捲而上無疑矣韓退之雪詩云今朝踏作瓊瑶迹又雪詩云疑是屑瓊瑰皆比雪為瓊者以其白也許慎説文則云瓊赤玉也石曼卿紅梅花詩云繁萼香瓊亂殘英絳雪遺謂此耳若以余觀之瓊未必是赤玉恐叔重言之誤也宗懍云嵗旦燎竹于庭所謂燎竹者爆竹也王荆公詩云爆竹聲中一嵗除而今乃用于嵗前數日又出土牛以送寒氣此季冬之月也牛為丑神出之所以速寒氣之去不為人病耳而今乃用于立春之日皆所不曉西域正月一日燃燈中國正月十五日亦燃燈但西域燃燈本是供佛而中國燃燈特宴飲而已高麗復用二月十五日燃燈祀天神見石林燕語亦各從其便耶嘉祐雜録云正月十六日大耗京師局務如都商稅務亦休務一日其令如此然稿簡贅筆所載耗日止是耗磨耳故唐張説詩云耗磨傳此日縱橫道未宜又詩云上月今朝減人傳耗磨辰如此則止是耗磨磨茶磨麥等合忌之官司局務去處何必休務耶今人謂梅雨止半月以夏至為斷梅日非也梅雨夏至前後各半月故蘇東坡詩云三旬已過黃梅雨則梅雨為三十日可知矣蘇東坡嘗作端午帖子曰翠筒初窒楝薌黍復纒菰注云新筒裹練明皇端午詩序而藝苑又云東坡之意蓋謂楝當作練耳然余家收得東坡親寫此帖子墨刻范至能參政刋在蜀中其楝字不曽改只作此楝字不知藝苑何所見而謂東坡改作練字乎豈亦有贋作者而藝苑不能深察也蘇東坡云故人史生為余言中秋有月則是嵗珠多而圓賈人常以此候之古來除夕闔家團坐達旦謂之守嵗此事不知廢自何時前此四五十年小兒尚去理會今併不聞矣此事雖近兒戲然父子團圝把酒笑歌相與竟夕不眠乃是人家所樂者何為遽止也嘗觀杜子美守嵗詩云四十明朝過飛騰暮景斜蘇東坡詩亦云欲喚阿咸來守嵗林烏櫪馬鬭喧譁以至寒暄一夜隔客鬢兩年催昔人多見于篇詠則知前古大人無不守嵗者今小兒亦不復講可惜也余自幼聞長老言京師地方與泗州塔尖等泗州塔一十三級每級高一丈是京師地形比泗州高一十三丈爾今筆談所載乃云京師之地比泗州高一十九丈四尺八寸六分其數細計如此是必有所據而不妄矣東坡作徐州戲馬臺詩云路失玉鉤芳草合林亡白鶴野泉清若據后山詩話所載臺下有路號玉鉤斜唐高宗東封有鶴下焉乃詔諸州為老氏築宫名以白鶴此廣陵戲馬臺非徐州戲馬臺也正猶潘嶽作西征賦以陜之曲沃為成師所居不知成師所居乃晉之曲沃耳豈不為錯誤耶大孤山小孤山本是此孤字今廟中乃各塑一婦人像蓋訛孤字為姑字耳其地有孟浪磯亦訛為彭郎磯相傳云彭郎小姑壻也其言尤可笑蘇東坡遊孤山訪惠勤惠思詩云孤山孤絶誰肯廬道人有道心不孤可證其誤矣至僧祖可作大孤山詩乃云有時羅襪步微月想見江妃相與娛則又以大孤為大姑也余鄉古有黃姑林時人或曰黃公林又有黃公墓流傳以為秦世夏黃公也古有三皇五帝至秦兼皇帝而稱之皇者三皇帝者五帝也既曰皇帝遂稱后為皇后子為皇子兄弟為皇兄皇弟族為皇族則此皇字似非所謂皇帝之皇正如駙馬者天子之壻也以副馬給之故稱駙馬不知所謂郡馬縣馬者何義天子不可以主婚其嫁女則以公主之故稱公主不知所謂郡主縣主者何義此乃與以皇帝而稱皇后皇子等類殆不容稽考也懶真子録謂後世印文有三字者足成四字有五字者足成六字但取其端正耳不若漢世印文如丞相之印章乃五字也諸卿守相者不足五字則以之字足之彼蓋不思漢世以土德王數用五惟其數用五故印文皆作五字有不足者則以之字足之今既不尚土德又不用五數奈何以此責今人謂印文只取端正而不用五字乎馬永卿智識高明議論過人逺甚而獨昧于斯所未喻也本朝君相曰聖旨鈞旨太守而下曰台旨又其次曰裁旨初不敢指名其人獨王子無所稱乃曰王旨然上帶王字亦非所以尊王此無他蓋未曽涖事初無常格故也唐李罕之擅引澤州兵入潞州以狀白李克用曰取王裁旨卻是蓋是時風俗尚淳不敢過有稱呼而已本朝宣祖號安陵自太祖後更加永字者蓋太祖在西京日嘗曰朕自為陵名曰永昌陵故其後不敢改皆連永字者此也國初事簡易辦科舉與奏薦皆逐嵗有之治平三年有旨自今後三年一次科舉則知其前是逐嵗有也王文正公遺事云公自踐兩禁嵗有奏蔭則知此事亦是逐嵗有也本朝親王得用玉帶玉魚自神宗賜岐嘉二王始親王得用青羅傘紫羅大掌扇塗金鈒花鞍韉塗金茶鐐水罐自徽宗賜燕越二王始徽宗初踐阼詔以建中靖國改元是時羣臣或有言建中乃唐德宗時年號徽宗竟不之從此已兆播遷之禍矣凡改元紀號最忌與前世諡號陵名相犯宋熙寧崇寧二名乃南朝章后宣后二陵名也亦當時文臣不學之過舊傳徽宗見羣臣往往在宣和殿之後有保和殿保和殿之後有玉山殿又後有玉簫閣實逼外矣余以大內圖考之宣和殿之後乃雲華殿雲華殿之後乃玉華殿又後乃澄華殿即到瑶津池實御苑也不知何故不同如此祖宗之制異姓生封郡王者皆外戚之尊屬爾及其薨也始贈真王若故相而有勳德亦未聞有王爵之贈況生封者哉徽宗朝則不然是時乃蔡京用事遽封王介甫為舒王以其弟卞之外舅也又封韓魏公為魏王以其有援立之功而與之同也何執中之死則封為清河郡王以其在朝同執政也以至鄭居中贈滎陽郡王童貫封廣陽郡王若此者莫非為身謀耳謂他日既殂之後一郡王無疑豈知禍變相仍重責以死僅免于刑戮由其用心不臧故也然而京之所自為謀者又豈止此一二事而已耶蔡元長在徽宗朝變亂舊章者何止一事其罪固不容于誅矣而其最大者是改公主為帝姬郡縣主為宗姬族姬姬蔡姓也今為帝姬為宗姬族姬是欲天下皆歸于姬姓也謂之不反可乎其子絛作國史後補乃謂徽宗以公主郡縣主為不典遂命有司議之以本朝嬴姓欲易公主為帝嬴郡縣主為宗嬴族嬴徽宗又以為不合時宜因喻大臣曰姬雖周姓後世以為婦人美稱不獨為姓也在我而已元長因奏言臣乃姬姓懼有嫌徽宗笑而不答乃降手詔此一段皆是妄言觀絛之用心蓋謂當時之人不知之作此書以專掩其父之惡而不知陳東已備言之於欽宗之朝矣獨恨當時羣臣見元長之置四輔三衛以為反議三恪陪位以為反乃不言改公主為帝姬郡縣主為宗姬族姬以為反何也余謂絛之言正所謂欲蓋彌彰矣天下其可以厚誣乎晉人夫婦皆相呼為卿王渾之妻謂渾曰我不卿卿誰當卿卿此婦稱夫為卿也山濤謂其妻曰我後當為三公但不知卿堪作夫人否此夫稱婦為卿也觀古人閨閫之間其情意如此亦可見當時風俗之美懶真子録載陶淵明責子詩云雍端年十三不識六與七謂雍端乃二子名且淵明清德如此而有如夫人余觀淵明與儼等書云恨室無萊婦抱茲苦心汝等雖不同生當思四海皆兄弟之義管仲鮑叔分財無猜他人尚爾況同父之人乎以是知淵明有如夫人無疑也續世説云吳規頗有才學王綸引以為賓客張纘出為湘州刺史路經郢州綸餞之南浦規在坐纘不平之忽然舉盞曰吳規愛汝得陪令宴規即時起規子翁孑焉正知父被辱氣結便卒規憤哭亦殞規妻深痛夫子越日繼亡類苑云劉潛以淄州職事權知鄆州平陰縣事一日與客飲驛亭左右忽報太夫人暴疾潛馳歸已不救矣抱母一慟而絶其妻見潛死撫尸大哭數聲亦亡夫前古夫妻父子之間其至性有如此者至後世則不必然矣唐語林載韓文公有二侍女曰栁枝曰絳桃其奉使王廷湊也至壽陽驛有詩云風光欲動别長安春半邊城特地寒不見園花并巷栁馬頭惟見月團團逮歸栁枝踰垣遁去家人遽追獲又有詩云别來楊栁街頭樹擺亂春風秪欲飛惟有小園桃李在留花不發待郎歸自是專寵絳桃余謂此二詩決非文公所作蓋當時附會者為之爾人家豈無侍女況又有踰垣之事文公乃唐一代人傑豈得淫言媟語見于詩什乎容齋續筆云世言白樂天侍兒惟小蠻樊素二人余讀小庭亦有月詩云菱角執笙簧谷兒抹琵琶紅綃信手舞紫綃隨意歌樂天自注云菱谷紅紫皆小臧獲名若爾則紅紫二綃亦女奴然余又見樂天詩云如何斷取曹綱手插向重蓮紅袖中如此則樂天女奴乃五人蓋又不止如前四人也他日容齋聞之寧免一笑耶白樂天詩云病與樂天相伴住春隨樊素一時歸余每讀至此未嘗不為之淒然嗟乎無情者其草木也若猶有情當此時其何以自處耶余然後知情之惑人甚矣自非胸中有大過人者而能以理自遣不為其所陷溺者幾希矣夫石崇喬知之輩非無過人之才絶俗之智一為所惑遂至喪家亡身況下于二人者乎壽禪師垂誡云但能消除情念斷絶妄緣對世間一切愛欲境界心如木石雖復未明道眼自然成就淨身與夫胡僧法調將終與衆别云山河大地皆變滅而況人身安得長久但能專心清淨屏去三毒形數雖乖其會必同如此等語言端不可不留意也世人見父母疾革往往有割股者已為異事矣獨國初呼延贊以子疾革乃亟割股以食之此亦世所無者王懿恪公歐陽文忠公同為薛簡肅公壻人皆謂簡肅公能擇壻也以余觀之簡肅公蓋能知人耳嘗聞公知成都日一見范蜀公即俾同子弟講學曰范君廊廟人也洎自成都還或問曰歸有何竒物公曰蜀珍不足道吾得一偉人耳謂蜀公也既而蜀公為賢從官簡肅公知人如此其得二壻皆賢宜矣蘇東坡及官可蔭補以伯父之孫彭見墓志黃太史遇郊當任子舍其子而官其兄之子見豫章先生傳觀二公用心如此其中非有大過人者孰能爾耶未論其文章也蘇東坡詩云我大似樂天但無素與蠻挂冠及未艾當獲一紀間意亦欲如樂天退居之後安貧樂道優遊以卒嵗耳乃晚嵗竄逐海上滯留七年後雖復官以歸而奔馳數月竟殁於中途良可嘆也國史後補載蔡元長呼蔡攸為公蔡攸其子也人皆笑之然史記陸賈傳賈亦呼其子為公此事未可便以元長為非廉宣仲高才幼年及第宰相張邦昌納為壻當徽宗時自謂平步青雲及邦昌得罪而宣仲官竟不顯病廢纍年以死其作畫松詩云獨倚寒巖生意絶任他桃李自成蹊讀其詩則其人可知或云人家種南天竺則婦人多妬余聞之舊矣未知其果然否向在江陰時有一曹檢法者其妻悍甚蓋非止妬也曹嘗建一新第求所謂南天竺者將植于堂之東偏余是時偶到彼處姑以所聞告之曹􅋏然應曰其果然耶我家今無事尚不能安帖況復植此感動之物乎余曰事未可知聊為耳目之玩亦自不惡也曹曰耳目未必得玩而先潰我心腹矣則不如其已遽命撤去坐客無不笑之禮記孔子之父叔梁紇字叔梁稱字在名上古人下語或如此孟明視世族譜以視為百里奚之子名視字孟明政與叔梁紇同也孔子弟子琴張琴牢也子張乃姓顓孫名師紹興中太學試仁天之尊爵賦取上第一人第二人皆以琴張為子張第一人云琴張難與終懷干祿之疑第二人云笑琴張難與並為徒懷干祿而試官與舉人皆不悟抑何鹵莽至此耶王元之詩云未必頸如樗里子也應頭似夏黃公畢文簡公以為非黃公未嘗姓夏當云綺里季夏及黃公為二人可也今觀皇甫謐高士傳云夏黃公姓崔名廓字少通齊人隱居修道號夏黃公又郤是其號未知其孰是也揚子雲法言云育而不苖者吾家之童烏乎九齡而與我玄文步里客談謂童下合有一點蓋子雲之意嘆其子童蒙而早亡故曰烏乎是即嗚呼二字後世乃謂子雲之子名烏雖蘇東坡張藝叟諸公莫能辨之觀東坡在惠州其子遁之死也有詩云苖而不秀豈其天不使童烏與我玄藝叟以公奴早亡有詩云學語僅能追驥子草玄安敢望童烏是亦以烏為子雲之子也衛夫人名鑠字茂漪即廷尉展之從妹汝陰太守李矩之妻中書郎李充之母此南窗紀談所載也初疑衛是封號然法帖中有衛夫人一帖稱衛稽首其末云李氏衛和南衛又似是其名及讀東觀餘論乃云帖中衛夫人既與師書自當著名不應稱夫族及姓也然後知衛乃是其姓而李者其夫族耳是時書之體格蓋如此蘇東坡詩云他年一舸鴟夷去應記渠儂舊姓西西謂西子也西子本姓施而世稱西施蓋東西施之謂耳東坡乃以為姓西誤矣蘇東坡詩云獨看芙蓉傾白墮余案洛陽伽藍記載河東劉白墮善釀所謂白墮者當是其名然殊無意義疑斯人既白而且大故閭里呼為白大如所謂黑闥相似黑闥本是黑獺訛為黑闥耳閭里之名鄙俗不可以理測有如此者朝氏客語載蘇東坡好戲謔每與人笑語必曰毋使范十三知蓋范淳父排行第十三也淳父平時每見東坡戲謔或稍過必戒之故耳然淳父家傳説其排行皆只云第三一處云先公第三視忠文諸子為諸父行又一處云忠文謂諸子曰三郎汝師也當取法焉又一處云時亦欲出矣而三郎勸止遂已三處皆只云第三家傳自不錯而客語誤載之耳黃太史詩云為喚謫仙蘇二來故人謂蘇東坡排行第二其實第九二也濟南先生李方叔集中有贈小蘇先生九二丈詩則知東坡第九二矣懶真子録載黃太史名庭堅字魯直其義不可解或曰慕季文子之逐莒僕故字魯直恐未必然也庭堅乃八愷之名本朝仁宗重魯宗道之為人嘗書曰魯直豈太史慕二公之堅直字而名之意或在是耶甕牖間評卷三
