body:
  text: 甕牖間評卷四宋袁文撰家語纍纍然若喪家之狗喪字當作去聲言如失家之狗耳故蘇東坡詩云惘惘可憐真喪狗是矣而元微之詩乃云飢搖困尾喪家狗又卻作平聲用何也案喪家狗據韓詩外傳論文義應讀平聲元稹詩蓋本之淮南子云燭龍在鴈門北蔽于委羽之山不見日其委羽二字據許景衡詩云委羽人物已仙去陳迹風流猶至今委音於危切羽音俱依切乃委蛇也則知蔽于委羽之山者亦合作委蛇音矣王充論衡云鼻不知香臭為甕則知今之人以鼻不清亮者為甕鼻作此甕字未為無自也弊字下從大其從廾者俗書也然世皆通用為弊字葬字下從大其從廾者俗書也然世皆通用為葬字奬字下從大其從廾者俗書也然世皆通用為獎字至莫字則不然莫字下亦從大其從廾者乃本於説文非俗也而世反不用所不可曉若夫奕字則又不然奕字下亦從大説文則云奕圍碁也其從廾者説文則云奕大也二字義絶不同而世混為一字用尤不可曉也顧眄之眄乃音面字今觀束晳餅賦其間云氣勃鬱以揚布香飛散而逺遍行人垂涎于下風童僕空噍而斜眄擎器者舐脣立侍者乾咽眄字乃與遍字咽字同押則知古人用眄字自讀為面字矣潘安仁好借聲為韻其作西征賦云殞吳嗣于局下蓋發怒于一博成七國之稱亂翻助逆以誅錯錯者鼂錯也本音倉故切乃借為倉各切焉郭璞記云有魚名修有水名滫天下大亂此地無憂言可避亂也然滫水二字自黃太史以來只作此修字何耶匡謬正俗云衛夫人則有勑寫就章隨學規厯之謬勑當作敕敕字從束從文不從來從力敕字乃是變體書猶可用也至于勑字則與賚字同豈可謂之敕字然集韻諸書中敕字有作勑字者其誤為甚矣石正源作為此書正當别白而詳言之其見亦復如此抑可謂承其誤也敕字從束或從來者乃束字之變體耳與漢書東方朔傳以棗作來來者同從來字而加力則為賚字矣嘗觀丁度作集韻入勑字在敕字門中又陳文惠公寫天慶碑作勑字已不可曉而王荆公作字説至詳悉矣敕字仍作來字解何也夫字之難辨者至多而又為人所變改遂失古人之體玉篇云梅與梅同字説云梅用作羮和異味而合之如媒也然則梅李字亦可作梅李矣白疊布也只合作此疊字今字書又出一字為白也木綿亦布也只合作此綿字今字書又出一棉字為木棉也二者皆非也推其類而求之字如此者甚多左氏傳正義云字者孳乳而生既有此疊字遂生此字既有此綿字遂生此棉字其孳乳豈謂此耶沽字有二義有作去聲用者有作平聲用者如李太白詩云夜臺無曉日沽酒與何人東坡詩云潘子久不調沽酒江南村此作去聲用也如東坡詩云得錢只沽酒又曰沽酒飲陶潛此作平聲用也杜子美字學不明其作詩多用重字而不之悟如寄劉峽州詩云家聲同令聞時論以儒稱又曰姹女縈新裹丹砂乏舊稱不知稱字即古之稱字其稱字乃後人誤改稱字之偏旁耳奉漢中王手札詩云國有乾坤大王今叔父尊又云從容草奏罷宿昔奉清樽不知尊字即古之樽字乃後人誤增尊字之偏旁耳子美作此二詩郤不如韓退之郾城聯句云兩廂鋪氍毹五鼎調勺藥又云但擲雇笑金仍祈卻老藥前藥字蓋本子虛賦中勺藥之和具而後御之勺音酌藥音略後藥字乃如字退之所用一字其實是二字子美所用二字其實是一字唐韻欸音靄乃音媪黃太史書元次山欸乃曲注云欸音襖乃音靄太史誤耳洪駒父詩話亦云欸音靄乃音媪是已苕溪漁隱不曽深究乃謂駒父不曽看元次山詩及太史此注妄為之音而不知已自不曽看唐韻反以駒父為誤也韓退之詩君欲問方橋方橋如此作作字與過字同押音做明矣苕溪漁隱云老杜詩主人送客無所作作字當音做也余謂黃太史詩云斂手還他能作者此作字豈不當音做乎蓋與前二作字義同也韓文公詩未諳鳴摵摵案苕溪漁隱云摵音縮又音索止此二音朝無咎詩云上山割白紵山高葉摵摵持歸當户績為君為絺綌郤又音為戚矣五經文字云自目曰涕自鼻曰洟此二字從弟從夷夫弟者弟也夷者姨也有同體之義前古制字不為無義也芉者羊也當從草從干作芉字見五經文字者山羊也當從草從見作字見林氏字源二字必從草者蓋象其角耳然則制字誰謂無法乎世言俸給俸字皆作諷音今案禮部韻略俸字郤與縫字同如此則俸字當為平聲不當為去聲矣華陽華字是去聲華山之華也林和靖詩云終約吾師指芳草靜吟間步岸華陽疑華字不可作平聲小乘禪乘字是平聲汪彥章詩云應物聊為小乘禪疑乘字不可作去聲宋莒公謂回字直屈一筆非兩口也余觀蔡君謨作回字多從此體然後知莒公之言為可信不疑資古紹志集有逡遁退讓字歐陽文忠公以遁為循初亦疑之後見羣經音辨云遁音循然後知音循為是文忠公自不妄也因話録云祠部俗謂之冰廳冰字唐書音作去聲歐陽文忠公詩乃有獨宿冰廳夢帝關冰字作平聲用文忠公誤矣而沈存中作江南春意樂府詞云艇子隔溪語水光冰玉壺冰字自音去聲則知冰字可以作去聲音故存中特著于此字説于種字韻中入穜字云物生必蒙故從童草木亦或種之然必穜而生之者禾也故從禾是王介甫亦以穜為種字焉藝苑雌黃云穜植之穜其字從童之用切種稑之種其字從重直容切蓋與此意同矣今人作添減字添字從水是也而減字從冰冰乃是冰字于減字有何意義其謬誤有如此者蘇東坡書皇太后閣春帖子云宫中侍女減珠翠作減字方為得體夫字固有難知者而添減二字殊易曉雖善書者略不為稽考秪循俗而書之殊可怪矣奈何乃連綿字世多稱無奈何是已奈字上從大下從示當作奴箇切不可作奴帶切而音為奈字也蘇東坡詩云平生不盡器痛飲直無奈舊人舉眼看老伴餘幾箇奈字乃與箇字同押是東坡詩用奈字作奴箇切矣若木下示卻是奴帶切果木名與奈字自是兩字豨苓豨字本仄聲蘇東坡詩云千金得竒藥開示皆豨苓是已而唐子西乃作平聲其詩云豈有豨苓解引年是也世言葷腥葷非素食也而字乃從草則又非腥羶比矣蘇東坡作剖桃核得硫黃之説云自是斷薰血乃復用此薰字不知何故蘇東坡作參寥子真贊云惟參寥子身貧而道富辨于文而訥于口外尫羸而中健武與人無競而好譏刺朋友之過枯形灰心而喜為感時玩物不能忘情之語此余所謂參寥子有不可曉者五也其間口字合音孔五切見詩補音過字合音古字見唐韻庶幾與贊中武字五字叶也此知前輩作文不妄下語皆有所本矣字之從水者篆文作此字蓋水字也至隸書不作字乃更為三點亦是水字然三點之中最下一點挑起本無義乃字之體耳若不挑起則似不美觀本朝獨黃太史三點多不作挑起其體更遒麗信一代竒書也匡謬正俗解果字云果然飽貌夫果然乃獸名黃太史帖云腹猶果然以腹大故耳然不可止云飽貌也黃太史云能奴來切三足鱉也今于來字韻中用法士多懷能乃是僧似鱉耳據此則才能字不可作奴來切押矣然古文固有用本字而借他音者張平子西京賦云托紫貝搏耆龜扼水豹馽潛牛郭璞遊仙詩云京華遊俠窟山林隱遁棲朱門何足榮未若託蓬萊臨源揖清波凌岡掇丹荑夫龜字作鳩字音萊字作黎字音非本字而借他音押者乎又況荀子成相篇云世之災妬賢能飛廉知政任惡來潘正叔贈王元貺詩云遊鱗萃靈沼翔翼希天階濟川用舟楫致治由賢能其用能字固有作奴來切者太史豈一時失記而誤言之耶米元章寫遂州聖母廟碑梁字更加木而作梁字梁字自有木何用更加木也役字古或從人五經文字言之甚詳米元章蓋知之矣故其帖文陋邦幸得君子與遊未良款而行伇相仍作此伇字是也又字説云戍則操戈役則執殳余謂此役字不必從彳止合作伇字五經文字自有此伇字也淋浪二字浪字乃平聲蔡君謨詩云堂上壽觴淋浪滿其浪字卻作去聲用漫浪二字浪字乃去聲李方叔詩云令人卻憶漫浪翁浪字卻又作平聲用皆所不能曉者也筆談辨吳字本從口從矢非從天也非從天良是然從矢者亦非也蓋吳字從口從即大字其義與㕦同皆訓大聲故從口從大吳字正不當從口天前輩論之甚詳矣蔡君謨有美堂記云以資富貴之娛娛字卻寫作娛字非也蔡君謨寫東閣記景字頭上從口洪景盧自書其表德景字頭上亦從口均誤也獨不見漢書音義解景字云日居于頭上京在其下故為景耶何失稽考如此詩家用乞字當有二義有作去聲用者有作入聲用者如陳無已詩云乞與此翁元不稱蘇東坡詩云何妨乞與水精鱗此作去聲用也如唐子西詩云乞取蜀江春東坡詩云乞得膠膠擾擾身此作入聲用也奈字從木奴帶切奈字從大奴箇切字形音訓全不同然人寫奈字往往多作奈字奈字之作奈字蓋二字易于相亂故多錯誤胡宗愈寫杜子美詩雞栖奈爾何奈字從大誠是也然其後寫宿陰繁素奈合作奈字今乃作奈字其左既添一木若復從木疑字書無此字所不可曉信者使人也今乃以為書信之信東觀餘論引援古昔辨之為甚詳而獨不記顔真卿麻姑仙壇碑云有頃信還但聞其語一事何也則知信者果為使人矣孟浪二字世皆作如字讀今案西溪叢話載孟浪二字孟字音母朗切又案匡謬正俗載孟浪二字浪字音盧黨切然則孟浪二字當作上聲讀矣屏營二字據藝苑雌黃乃有傍徨恐懼之意屏音卑盈切本朝有徐安人者能詩有集行世其作秋扇詩云西風颯高梧枕簟凄以清團扇猶在側揮弄意屏營觀其詩意似與藝苑雌黃所言相合若揚子雲萃之屏營嬴擅其政庾亮讓中書監表云憂惶屏營不知所厝此二書皆音屏為上聲誤矣昔字古作昔上從四人下從日四人乃肉形得日則乾正脯臘之臘字隸書乃作昔遂借為今昔之昔後人不察前人之意以為此乃今昔之昔字卻于音旁復加月是添一肉以為脯臘之臘正猶莫字已有日復加日在其下暴字已有日復加日在其傍殊失前人之意也䤬鑼二字字書云䤬素何切鑼與羅同音當喚為沙羅也而今人竟用作沙羅者無他意姑取其一邊耳今人作脆字從月從危非也字書脆字乃從月從色蓋從絶省耳言肉易斷也膂肉之膂將謂用此膂字字書中乃出一吕字云脊肉也象脊膂之形又象律吕上下相生之形然則膂肉字當用吕字耶波稜出西域泥婆羅國軍達出大食國今四字皆加草于上可見字書之誤古來慶賀必有物故慶字從鹿賀字從貝鷹字既從佳又從鳥似不應重疊蓋雁字只從隹于雁上加一點乃鷹字也今再加鳥者抑後人妄增耳盧黑色也古劒名湛盧者謂湛湛然黑色也犬名韓盧者蓋六國時韓氏之黑犬也水名盧龍者北方謂水之黑色者也果名盧橘者亦黑色也今人作寬字于見字旁須著安一小點蓋寬字從莧音胡官切乃桓字山羊是也能宀其山羊惟寬為可故寬字從宀從莧若妄作莧字乃是菜名非寬字之義也甕牖間評卷四
