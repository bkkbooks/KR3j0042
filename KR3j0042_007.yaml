body:
  text: 甕牖閒評卷七宋袁文撰北夢瑣言載狄右丞愛與僧游其有服紫袈裟者乃疎之此正鄭都官詩所謂愛僧不愛紫衣僧者也本朝自仁宗以後始拜佛見吕原明侍講雜記蘓東坡作海月辨公眞贊云師神氣澄穆不見喜愠及作志林記辨公遺事乃云辨師常喜人未嘗見其愠二處所説不同如此僧參寥者蘓東坡與遊甚密疑參寥二字乃道號故東坡云維參寥子身貧而道富又云屬參寥子以書遺予然東坡一帖乃以為參寥字若果字參寥又不應作參寥子此余所未曉者俟更攷之人多以僧為奴所謂秃奴者是也今蘓東坡記異一篇又以道士為奴二者固皆可以奴稱耶黄太史過泗州禮僧伽之塔作發願文痛戒酒色肉食可謂有髙見者也世之人惟其所見不髙故沈溺而不知返今太史乃能一念超然諸妄頓除視身如虛不為纖塵所汚又作文以痛戒之可不謂有髙見者乎而或者乃病其不能堅守暮年猶有所犯余嘗究其然盖太史乙酉生是時有桞彦輔者乃耆卿之孫善隂陽能決人生死謂太史向後災難大抵見于六十以下太史六十一貶宜州以卒則彦輔之言信矣當其在宜州棲遲瘴霧之中非菜肚老人所宜其況味盖可知乃兄子明自永州來訪之有隣人曹醇老送肉及子魚金橘來故不免與兄同食葷若酒色則不知所犯也後有汙衊之者皆輙以前事妄相訾毁太史寧有是耶縱時或食葷較之刲羊刺豕庖鼈鱠鯉而不知紀極者為如何君子存恕心不可不為明之也佛經云平生不妄語其舌可能及胘後見黄太史詩云我舌猶能及鼻尖恐亦是佛經之意也國史後補載王老志行事詳矣獨不載蔡元長一事何也初徽宗命老志館于元長賜第老志見時事如此因謂元長曰速避位禍將及矣元長聞之謂所親妾曰吾未知他日竟如何此事乃載于避暑録話豈後補之書亦有遺忘耶余嘗問人藥石之義答者多不同夫藥固無可疑者若石則砭石也昔王僧孺多識故事侍郎金允起間訪以砭石對曰古者以石為針初不用鐡也是知砭石可以刺病人有病患有用藥者有用砭石者此所以謂之藥石蘓東坡言蜀人龐安常善醫而聵凡與人接談必冩字而後能曉東坡嘗戲之曰子以眼為耳吾以手為口吾與子皆異人也東坡一時以此戲安常則善矣然不覺自狀為啞者讀此可發一笑蘓子容少受知于杜祁公出處略同杜祁公為相不及百日而經宗祀冠貂蟬數有大儀制皆預後以東宫少師致仕年八十而薨子容在相位不及一年嘗預冊后郊祀以少師致仕年八十有二與祁公出處始終略同此子容之孫象先所叙也及攷子容在南京幕時婺州一衙前葛好問者精于星度嘗謂子容之命全似杜祁公今以行事觀之則好問之言信不誣也舊聞李虛中論命不用生時今觀夷堅志載季勲論命亦不用生時此異事也余曩時嘗與人論命皆云惟生時為最緊要夫一時中有淺深且分為初中末以此定禍福猶恐有誤今乃不用生時何以取決乎然二公藝術之精舉世莫能比往往十中八九又所不可曉者隂陽至有不可曉者泊宅編載許㡬陳與義皆午生因馬驚而致禍不旋踵以死或云唐明皇酉生而好闘雞又云木命人畏漆皆此類也隂陽家云甲戌乙亥山頭火江隂君山頂上有塔一所乃甲戌日建既而被火今累年竟不復修隂陽之説亦不可不信也今人皆言珓杯古人謂之杯珓韓退之詩云手持杯珓導我擲云此最吉難為同又集韻云杯珓巫以為吉凶器者唐韻云杯珓古者以玊為之皆作杯珓也鴻鵠二字若據史記音解燕雀安知鴻鵠之志并鴻鵠髙飛一舉千里云云自是一種鳥名鸞鳳之屬非鴻鴈與鵠也而韓退之病鴟詩乃云擬凌鸞鳳羣肯顧鴻鵠卑又何耶鴝鵒交則以足相勾故其字從句謂之鴝鵒者以此黄太史詩云百舌解啼泥滑滑夫百舌春間鳴至春季則不鳴所謂反舌無聲即此耳若泥滑滑乃田間一種小鳥名曰竹雞非百舌也東齋記事載吉州有捕猿者殺其母皮之幷其子賣于蕭氏後旬日示以母皮跳躑號呼不食而死玉壺清話亦載一家合藥當用蝙蝠遂擒得一枚爛杵貯之器中明日諸小蝙蝠皆圍遶之此二事讀之􅋏然余平生最不嗜殺得活魚蟹往往放之江中不復食凡蠢動之物非是無情第不能言耳奈何世之好殺者惟務恣其口腹其誰肯以衆生之命為命耶古語鄭康成家牛觸牆成八字故王琪舉以戲張亢云張亢觸牆成八字盖指其為牛也嘗謂人之目日間能視而夜間不能視至貓狗則不然夜與日能視同也因觀松漠紀聞載肓骨子其人長七八尺捕生麋鹿食之目能視數十里秋毫皆見盖不食煙火物故眼明以是知貓狗夜而能視者殆亦以食生物而眼明也蜥蜴蛜蝛非冬間所有之物蘓東坡在廣南上元夜有詩云静看月牕盤蜥蜴臥聞風幔落蛜蝛豈廣南地暖而此二物不蟄耶酉陽雜俎載蝦姑狀如蜈蚣食蝦余謂蝦姑可對鴉舅而唐陸龜䝉詩云行歇每依鴉舅影挑頻時見鼠姑心以鴉舅對鼠姑不知鼠姑何物也蚊子初不能鳴其聲乃鼓翅耳何以知之盖蚊子立定則無聲惟飛起有聲故知其聲不在于口而在于翅也歐陽文忠公蚊子詩云萬枝黄落風如射猶自傳聲欲噬人是未嘗細察耳歐陽文忠公蚊子詩云蚤虱蚊䖟罪一倫未知蚊子重堪嗔又詩云嘗聞髙郵間猛虎死凌辱哀哉露筋女萬古讎不復而孟城孫公談圃亦載秦州西溪多蚊子使者按行左右以艾煙烘之有㕔吏醉仆為蚊子所嚙而死其可畏有如此者吴都賦云蛟鯔琵琶註云琵琶魚無鱗其形似琵琶豈今所謂䱋魚者乎蘓東坡作渼陂魚詩云烹不待熟指先染乃在去聲韻押然左氏傳載染指事染字音如琰反作上聲押可也豈其錯誤耶漫録載紹聖三年始詔福唐與明州嵗貢車螯肉桂五十斤俗謂之紅丁子蘓東坡所謂江瑶柱是也又載劉貢父以蔡確為倒懸蛤蜊蛤蜊一名殼菜夫車螯江瑤柱蛤蜊殼菜自是四物余鄉皆有之漫録乃以為二物其不詳審如此泊宅編云鶻生三子一為鴟鸛生三子一為鶴齊民要術云一梨十子惟三子生梨餘皆生杜澠水燕談云鱷卵化山谷間大率為鱷者十之二三餘或為黿或為龜以是知天地間物所生而不盡相肖者往往然也凡花皆以美名襃之故宋咸牡丹詩云寳花初爛欲連枝是以牡丹為寳花也蘓東坡海棠詩云惟有名花苦幽獨是以海棠為名花也黄太史水仙詩云糞壤能開黄玉花是以水仙為黄玉花也以至李太白以瑞香為仙花見于其詩所謂聞道仙花玉染紅者洪駒父以巖桂為可憐花見于其詩所謂誰折可憐花置我經行處者是未嘗不以美名襃之也夫蓮花在諸花中亦甚竒特前輩賦詠之者甚多許彦周詩話云世間花卉無踰蓮花者盖諸花皆藉暄風暖日惟蓮花得意于水月可謂紀其實矣而陳去非乃獨以繁花目之其詞有云今年何以報君恩一路繁花相送到青墩使蓮花有知寧不稱屈耶牡丹謂之眞花見牡丹記又謂之寳花見宋咸詩獨歐陽文忠公名為最好花嘗與王君貺詩云最好花嘗最後開君貺得之不樂盖有故而然然非為惜花者也又云好事者多用牛酥煎牡丹花而食之可見其流風餘韻此事得之蘓東坡集中東坡雨中明慶寺賞牡丹詩云故應未忍著酥煎又詩云未忍汙泥沙牛酥煎落蘂是也唐之唐昌觀玉蘂花後王元之更名曰瓊花説文云瓊赤玉也而晏元獻公乃于李善文選注質之云瓊乃赤玊與花不類此事非出于文選也今人染弗肯紅名玊色非也當名肉紅耳吳曽能改齋漫録記芍藥名云沔池紅註云千葉肉紅又赤苗旋心亦註云千葉深肉紅于此可見事物紀原載蘭香本名羅勒後避石勒諱改曰蘭香至今以為然然春秋時鄭文公有賤妾燕姞夢天使與已蘭且曰以蘭有國香人服媚之如是故生穆公而名之曰蘭事物紀原何以謂先名羅勒耶而沈存中忘懐録又謂蘭有二種黄花者最香紅者次之然蘭皆是紫花無黄紅二種未審存中將何者為蘭也司馬相如賦云蕙圃衡蘭顔師古註云蘭即今澤蘭别是一種花非蘭也此乃不曽親見妄意而言之耳此物余鄉有之故知其言之失若遠地不生之處則遂信以為誠然者矣豈不誤天下後世乎嵇康養生論并博物志云合歡蠲忿萱草忘憂自古以為二花今沈存中忘懐録種合歡法下註云萱草也謂合歡即萱草存中之言誤矣存中不獨于此誤其于蕙乃云今俗謂之鈴鈴香亦非也蕙别是一種花黄太史謂一幹而六七花者余鄉有之豈是鈴鈴香也沈存中忘懐録蕙今俗謂之鈴鈴香余謂不然前已嘗論之矣後觀廣志云蕙草緑葉紫花陳藏器云此即是零陵香生零陵山谷乃用此零陵二字意謂蕙實生零陵存中初不之知誤認零陵以為鈴鈴也而忘懐録又註云呼零陵者非則是存中眞以鈴鈴為是然蕙本非鈴鈴而鈴鈴香者自别有一種草耳浙中海棠開遲故小詞云海棠花謝清明後以此知三月始開也黄太史詩云緑荷菡蓞稍覺晩黄菊拒霜殊未秋觀太史詩意似直以菡蓞為蓮花夫菡蓞本蓮花未開之狀故説文云芙蓉華未發菡蓞已發芙蓉宋之問秋蓮賦序云玊池清泠紅蕖菡蓞李白詩亦有鏡湖三百里菡蓞開荷華之語于此盖可知矣世人用芰荷字多不辨夫芰菱也荷蓮也二者初非一物屈到嗜芰盖喜食菱耳而秦少游詩云紅菱秋開鑑水香菱花潔白無紅者豈少游亦誤以芰荷為一物而未之察耶玊蘂花今為散水花其聲譌爾散水見西溪叢話蘓東坡詩云堂前種山丹錯落馬腦盤堂後種秋菊碎金収辟寒菊比碎金固然不知山丹何以比馬腦盤耶今世所謂山丹者其狀宛類鹿葱但差小耳此乃和其弟子由詩疑東坡蜀人不識山丹誤認為鸎粟耳黄太史以拒霜為霜花作詩云霜花留得紅妝面又詩云天遣霜花慰此公又以拒霜為木蕖詩云紅妝滿院木蕖秋歐陽文忠公評王介甫詩云秋花不似春花落憑仗詩人仔細吟是固然也然秋花獨菊不落其他如木犀芙蓉之類盖無不落者則秋花豈盡不落耶蘓東坡志林載㓂元弼云徐州通判李陶有子年十七八素不能詩忽詠落花詩云流水難窮目斜陽易斷腸誰同砑光帽一曲舞山香父驚問之若有憑附者自云是謝中舍問砑光帽事云西王母宴羣仙有舞者戴砑光帽帽上簪花舞山香一曲曲未終花皆落去此事自載在羯鼓録中乃唐汝陽王璡嘗裹砑光帽簪紅槿花一枝明皇愛之令舞山香一曲曲終花皆不落此即李陶之子所用之事也不知何為錯誤如此然東坡作李公擇過髙郵詩云汝陽眞天人絹帽著紅槿其後又云曲終花不隕是東坡自知為汝陽王璡事已嘗用之矣且李陶之子既為物所憑附其説舞山香時花皆落去與花不落者既殊又記是西王母事東坡略不為辨之何耶蘓東坡詩涓涓泣露紫含笑焰焰燒空紅佛桑序云正月二十六日與數客野歩嘉祐僧舍東南野人家雜花盛開扣門求觀此東坡在惠州時也彼處春氣乃爾早耶方正月其雜花盛開如此而紫含笑紅佛桑且皆夏中所放花東坡竝及之又不知何謂也藥欄二字漢書注中云藥為藥欄為欄乃是二物而後之著述者往往只作一物用杜子美詩不嫌野外無供給乘興還來看藥欄周少年詩云藥欄風細才勝蝶桞陌隂濃不過鸎初非作二物也今之小金桃名曰御桃漢獻帝自洛遷許許州有小李色黄大如櫻桃帝愛而植之亦曰御桃宋王荆公詩云辛夷如雪柘岡西又詩云辛夷屋角摶香雪如是則辛夷花白色也唐書注乃云辛夷即木筆木筆卻是紫花深所未曉彼美玊山果粲為金盤實此蘓東坡榧子詩也趙次翁註云出信州玊山縣然信州初不出榧子此玊山乃在婺州婺州榧子冠于江浙注書不究地里之是否而妄意指名豈不大誤市中人賣果者有一種名棎子棎音視占切槁簡贅筆所謂青沙爛者博物志云梨類甚多柤杜棠棎廣韻云棎比柰而酸耳南天竺以其有節似竹亦謂之竹而沈存中筆談乃用此燭字不知何謂黄太史草書帖云時小雨清潤十三日所移竹各已蘓息惟自籬外移橙一株著籬似無生意蓋十三日竹醉而使橙亦醉亦失其性矣此一段説得良婉語言既新竒而又雜以恢諧使人賞玩不能去手夫十三日竹醉當是五月十三日此日止可移竹若移橙非上春不可今乃于中夏向暖時舉事宜其無生意也余故能知之太史書林中人豈知所謂移橙者第見杜子美詩中云細雨更移橙遂欲料理雖已得細雨而時已向熱不待趨而往視其槁死無疑又豈特無生意已哉遯齋閒覽載北人種芭蕉冬月必架小屋遮䕶何其誕妄也芭蕉至秋後著霜則皆枯瘁不好人家遂以刀截去明年再出新葉特可愛李林甫謂之清隂居士者此也若如遯齋所言縱遮䕶留舊葉亦何所用之蓋是初不識芭蕉聞人之言以意而著論耳余又聞南地芭蕉冬月雖大雪其葉儼然不動畧無所損此亦可愛矣甕牖閒評卷七
