body:
  text: 甕牖閒評卷一宋袁文撰字從天從雲省故易曰雲上于天字不從而也今人作需字乃從而葢篆文天字與而字相類後之作字者失于較量各從其便書之其誤甚矣五經文字云需音須遇雨而不進從而非也匡謬正俗以溺為㲻㲻乃是沈溺字溺又音而灼切其水不能勝鴻毛葢弱水也夫弱水弱字尚書只作弱字不知後加水㸃者又何據也匡謬正俗載武成往伐歸獸獸字作嘼字且云字林嘼音火救切人之所養也若武王歸鹿華山之陽放虎桃林之野即可言歸獸既是牛馬當依嘼字本音讀之不得以作獸字一邊便謂古文省簡即呼為獸也如此則是古本原作嘼字想因唐明皇改為今本尚書時未究嘼字之義而増益之也今其下亦云本或作嘼許救切益知古本作嘼字無疑矣忍字藏刃于心是能忍也書君陳必有忍其乃有濟書顧命篇一人冕執鋭蘇東坡書解云鋭當作鈗是也鋭本非兵器書既誤作鋭字而著書者又妄云鋭矛屬竟音以税切其誤抑又甚焉説文羕水長也從永羊聲引詩云江之羕矣然則漢廣詩中永矣永字當作羕字不知何故後改為永字詩匍匐救之救字可音居尤切葢自就其深矣方之舟之四韻皆是平聲而此救字卻只作如字乃陸德明之失也詩補音引三略使怨治怨是謂逆天使讎治讎其禍不救又引周武王盤銘與其溺於人寧溺于淵溺于淵尚可游也溺于人不可救也是矣柏舟詩云汎彼柏舟在彼中河髧彼兩髦實維我儀之死矢靡他又菁菁者莪詩云菁菁者莪在彼中阿既見君子樂且有儀又東山詩云親結其褵九十其儀其新孔嘉其舊如之何詩中用儀字極多補音云儀有牛河切合音莪字是也今觀尉卿衡方碑云感昔人之凱風悼蓼儀之劬勞此儀字本是莪字今竟作儀字然後益知古儀字皆可作莪字用補音之言信不誣矣桑黮即桑葚也氓詩云于嗟鳩兮無食桑葚于嗟女兮無與士耽註葚桑實也鳩食葚多則致醉泮水詩云翩彼飛鴞集于泮林食我桑黮懷我好音此黮字亦當作平聲但借字耳補音以其不在韻故遺余獨證此黮字既叶林字音字則與葚字同音椹字無疑也又五經文字葚音示枕切桑實見魯頌黮與葚同然氓詩自有葚字云于嗟鳩兮無食桑葚五經文字不引此葚字乃引魯頌之黮字何耶萱草豈能忘憂也詩云焉得諼草言樹之背者諼訓忘如終不可諼兮之諼葢言焉得忘憂之草而樹之北堂乎背北堂耳其諼字適與萱字同音故當時戲謂萱草為忘憂而註詩者適又解云諼草令人忘憂後人遂以為誠然也如嵇康謂合歡蠲忿萱草忘憂此二者止與千載之下作對若謂其實則無是理矣今人作文下字能用古者則為有據成佳作雖古人亦爾詩云有狐綏綏葢本塗山人歌云綏綏白狐九尾龐龐此禹娶塗山時歌詩人乃用其綏綏二字也梁王僧孺詠擣衣詩云㪚度廣陵音摻寫漁陽曲自註云摻七紺反音憾余謂摻音憾極是葢禰衡漁陽摻古歌邊城晏開漁陽摻亦當音作憾字以下句云黄塵蕭蕭白日暗暗字與憾字甚叶不可作他音僧孺既以摻字音憾字則詩摻執手者亦當音憾字無疑徐陸二家音七鑒所鑒切者皆非也詩補音明字有謨郎切如雞鳴之詩東方未明顛倒衣裳是也韓退之詩云嵗時未云㡬浩浩觀湖湘衆夫指之笑謂我知不明兒童畏雷電魚鼈驚夜光此詩用明字亦當作謨郎切矣世有孃惜細兒之語陟岵之詩云陟彼屺兮瞻望母兮母曰嗟予季行役季少子也母以少子行役其心眷眷然而形之語言如此此正所謂孃惜細兒者不獨今人為然古亦有之詩載弄之瓦人多以瓦字不叶為疑或云此瓦字乃是杘字耳古文與瓦字相類而小不同乃絡絲之具其意則是但未知果然否也奚斯未嘗作頌也詩所謂奚斯所作者葢廟爾揚子法言曰正考父常晞尹吉甫矣公子奚斯常晞正考父矣固已誤用後觀資古紹志集載太尉楊震碑云敢慕奚斯之追述樹碑石于墳道則又承揚子誤焉禮三十曰壯有室而家語載孔子十九嵗娶于宋之亓官氏而生伯魚然則禮經葢舉其大略耳西京雜記云櫻桃含桃乃二物禮記月令載羞以含桃漢孝惠緣此原廟薦櫻桃如此卻只是一物也鸎桃只合作此鸎字葢此果多為鸎所食而又曰含桃者亦為鸎所含故耳玉篇别出一櫻字已是妄作又出一梒字云今謂之櫻桃豈以又名含桃而復出此梒字耶此尤可笑者也春秋星隕如雨杜預註云如而也星隕而雨也而如固通用第恐雨時天上未必有星今觀唐臨淄王平國難之時唐史載是夜天星散落如雪則星隕如雨是亦㪚落者乎故余謂如字不可盡訓為而字也田單使人食必祭以致烏鳶恐無是理也春秋時楚師伐鄭鄭人將奔桐丘諜告曰楚幕有烏乃止又晉與齊戰諜者云城上有烏齊師其遁夫大軍屯駐之地豈復有烏鳶耶以二諜者之言攷之則知田單未必能致烏鳶矣理李二字古通用初無異義也周語云行理以節逆之管子云黄帝得后土而辨於北方故使為李以二書攷之則知左氏傳中用行李字或作理初無異義李濟翁資暇錄辨左氏傳行李作行􅡛謂􅡛字乃古使字其理為甚當前未有此説也王觀國學林乃云古文字多矣濟翁不言􅡛字出何書未可遽爾泛舉而改作余謂濟翁所説􅡛字葢出于玉篇山字部中載之為甚詳觀國作學林多引廣韻玉篇以為證獨不知􅡛字何也衙許慎説文音語無他音楚詞云道飛亷之衙衙衙衙行貌亦音語以是知衙字後作牙音者其出于唐人改牙為衙字之故歟左氏傳晉侯及秦師戰于彭衙衙字亦當音語矣而陸德明不音者葢德明唐人見當時呼為牙字不知前代只音語而失於稽攷也使左氏傳可作牙字則許慎必不只音語而不為牙字矣然則使後世轉為彭牙者其德明之過歟諺云眉毫不如耳毫耳毫不如老饕故蘇東坡作老饕賦然杜預註左氏傳云貪財為饕貪食為餮按饕餮一獸耳其為物食人未盡還自齧其軀山海經所謂狍鴞者貪食則固然矣恐未必貪財杜預乃分貪財貪食為二事未知何據古寧甯二字通用既曰通用則甯字可作平聲寧字可作去聲惟人名地里則不應如此要當歸一可也史記酷吏傳有寧成而漢書乃作甯成漢書地理志有廣寧縣而晉書乃作廣甯郡如此等類註家合攷其人名地里若是寧字則寧下不須音矣卻于甯字處下註云甯讀與寧同若是甯字則甯下不須音矣卻于寧字處下註云寧讀與甯同如此庶㡬後世知其合是寧字或甯字其音讀不至差錯也豈可不為區别而猥云寧甯通用也耶余嘗怪左氏傳納公孫寧儀行父于陳公羊傳乃作納公孫甯儀行父于陳而陸德明因鄭氏註禮運云陳靈公與孔甯儀行父數如夏氏乃云左氏傳作寧字公羊作甯字各依音讀如此卻是二人則已為可笑又賈生過秦論云六國之士有寧越徐廣註云或自别有此人不必甯越也初不知寧甯二字通用而妄為此論此尤可笑者也挑戰挑字左氏傳與漢書皆作上聲音今匡謬正俗挑字乃音他彫切恐誤黄朝英作緗素雜記載淮南子云鄢陵之戰陽穀進酒于子反而説苑乃以為穀陽班固古今人表又以為穀陽豎然當從淮南子為正余謂朝英為誤朝英獨不記左氏傳何也左氏傳云穀陽豎獻飲於子反當從左氏傳為正左氏傳鮑莊子之知不如葵葵猶能衞其足葵字疑是蔡字蔡大龜也龜之動必先縮其足葢有衞之之意且其性最靈則不可謂無知也若葵焉得有知乎夷庚地名也見左氏傳因杜元凱註云往來之要道後世遂以往來之要道名夷庚故束晳補亡詩云蕩蕩夷庚物則由之是矣補註韻中新添一棋字引左氏傳甯子視君不如奕棋然韻略自有棊字即此棋字也只合于棊下註云亦作棋卻引左氏傳甯子視君不如奕棋又何別出一棋字耶漢儒記鄭子産之事曰子産猶衆人之母也能食之而不能教之左氏傳乃云我有子弟子産誨之左氏傳云季郈之雞鬬季氏介其羽案羽左傳作雞此葢誤憶杜註為本文郈氏為之金距所謂季氏介其羽葢用甲以蔽雞之身庶不為金距所傷也前輩作文多借字故司馬遷以芥易介其義則同杜預因史記改作芥字遂有擣芥以播其羽之説非所以介其羽矣而高誘註吕氏春秋乃曰鎧著雞頭夫鎧著雞頭則與介其羽全别高誘不引左氏傳為證而妄為解説未知何所據也左氏傳一个註一个單使或者改一个為一介非也若可改則又弱一个焉亦可改為一介乎左氏傳一薰一蕕十年尚猶有臭臭葢其氣耳非不香也易曰其臭如蘭月令其臭香豈謂不香耶若分臭與香為二物香者為香不香者為臭非也一薰一蕕十年尚猶有臭此二句蕕可作又音而不音則非也蕕字本是平聲而可音又者如太𤣥聚首鼎血之蕕九宗之好好有許候切則蕕字當音又字矣臭字本是去聲而可音抽者以詩上天之載無聲無臭儀刑文王萬邦作孚孚有房尤切則臭字當音抽字矣惟維二字古通用唯字亦然書中盡用惟字詩中盡用維字各從其便故詩中維此文王左氏傳乃作唯此文王字雖不同而其義則同正義謂今王肅註詩及韓詩作唯此方且致疑于其間彼葢不知詩中盡用維字初無他義也詩云其㑹如林正書所謂紂率其旅若林者也許慎説文不合將會字作旝字解以為軍中機石乃攻城之具遂使陸德明音會作古外切為旝字至魏晉以來造雲旝翔旝飛旝連旝竟以旝為軍中機石而不知其誤自許慎説文誤解會字為旝字而然也夫旝者旃也乃大將所執之旗左氏傳云旝動而鼓是也今若以會為軍中機石則旝動而鼓作何説耶又況旝字從㫃㫃字可施于機石乎而五經文字方持兩可之説云旝者建大木置石其上發其機以追敵此之謂旝或又云旃也大將之麾是矣岐説如此將何以取決乎萬者蠍也万者十千也二字之義全別萬字之不可為万字猶万字之不可為萬字焉惟錢穀之數則懼有改移故万字須著借為萬字葢出于不得已初無他義也其餘万字既不懼改移則安用借為哉余嘗觀左氏傳云公以金僕姑射南宫長萬又云宋萬弑閔公于蒙澤恐是其名萬須著用如此寫若畢萬之後必大本是此万字誤借為萬何以知之卜偃曰畢萬之後必大萬盈數也茍非此万字何為有盈數之言以至詩書中如萬邦為憲無以爾萬方萬福攸同萬民是若用万字處甚多皆誤借為萬字耳如以万可借為萬字則四方亦可借為肆方五行亦可借為伍行乎以是推之二字之義不可以借昭然矣春秋書螽只曰螽詩以螽斯名篇猶是借本詩之二字其間往往有如此者豈可云言若螽斯斯乃是助辭與菀彼栁斯蓼彼蕭斯之斯同此序詩者之失也遂使後世竟以鸒為鸒斯而不悟如揚子雲法言云頻頻之黨甚于鸒斯者皆詩序有以啓之爾又法言于鸒斯斯字復添一鳥字不知何義遂使唐韻斯字門復添一􅠿字云此鸒􅠿之􅠿若斯字可添一鳥則栁斯蕭斯當復添何字殊可笑也只恐是後人誤添爾若子雲自作此字則當時問者又何以從其竒字耶泠倫古之能樂人也因詩簡兮序云衞之賢者仕于伶官泠字改為伶字後世遂以泠為伶其誤已久矣而左氏傳云泠人也古皆作泠或云樂官依字作伶其誤抑又甚焉若王介甫解伶字乃云伶非能自樂也非能與衆樂樂也為人所令而已此又似乎穿鑿詩補音云馬字有某音滿補切引左氏傳辛廖占之曰震為土車從馬為證故擊鼔之詩爰居爰處爰喪其馬于以求之于林之下馬字乃某音也野字有豎音上與切引左氏傳童謡云鸜鵒之羽公在外野為證故東山之詩蜎蜎者蠋烝在桑野敦彼獨宿亦在車下野字乃豎音也學林新編辨詩中下字陸德明釋音多音作户字然有不可者遂疑擊鼓東山二詩馬字與野字不叶而不知詩補音馬字有某音野字有豎音則知二詩下字皆可以音作户字無疑矣字書孥乃都切妻子也帑它罔切金帛所藏舍也此二字初不相干因毛詩常棣篇樂爾妻帑借用此帑字故左氏傳宣子使臾駢送其帑及爾以帑免史記向使二世除去收帑汙穢之罪漢書盡除收帑相坐律皆借用帑字而廣韻玉篇見諸書如此遂並以帑字亦音乃都切矣學林云檀弓杜蕢自外來註云杜蕢或作屠蒯左氏傳昭公九年膳宰屠蒯入釋音屠音徒余案杜與屠乃二音惟姓與名當專一音不可以呼二音本是杜蕢殆假借為屠蒯耳學林所言如此余以為不然葢屠者乃屠宰之屠田蒯之上世常主屠宰故其後為屠蒯屠非其姓也如所謂巫咸之巫師曠之師巫咸之先世為巫遂稱為巫咸師曠之先世為師遂稱為師曠與屠蒯之事同也檀弓乃改為杜蕢卻是假借用字耳豈可反謂左氏傳假借屠蒯而為之耶旦字從日從一一者地也日初出在地上則為旦故孟子云坐以待旦左氏傳云旦而戰月令云昏參中旦尾中古詩亦謂將旦羣陰伏皆日初出之謂而或者不知乃以日一為旦謂初一日也此説誤矣又有以曰下一為旦此説尤誤矣魯臧孫紇與叔孫紇紇字音恨發切世多是之今攷漢書云秦復得志于天下則齮齕首用事者墳墓矣注云齮音螘齕音紇正孟子禮記所謂胡齕者是紇與齕同音無疑矣不必音恨發切也左氏傳載逢丑父逢字陸德明無音千姓編乃歸在逄字門下與逄蒙同如此當讀作龐字德明失音也而孟子逢蒙逢字亦與左氏傳同孟子音又云逄從夅下江切以此知不獨德明失音而二經皆當從夅皆誤從夆矣非獨此也左氏傳楚人謂乳穀穀字德明音奴口切然穀無乳義廣韻去聲㝅字乃后切又去聲豰字如豆切皆云乳也葢左氏傳合作㝅或豰字初非穀字日久流傳之誤亦如逄字之與逢字矣匡謬正俗云孝經仲尼居居當音據則知詩鵲巢維鳩居之居字合音據字而陸德明失音也香彎類藁謂嬾真子錄以不佞為不才非也乃以佞為諂佞之佞亦非也惟洪慶善解論語以佞為口辯此説極為得之公孫丑云冉牛閔子顔淵善言德行而獨遺仲弓者以仲弓無口辯也故或曰雍也仁而不佞孔子荅以禦人以口給屢憎於人不知其仁焉用佞佞非口辯而何衞子行敬子言于靈公曰會同難嘖有煩言莫之治也其使祝佗從及其將長蔡也賴佗一言而卒長衞侯故孔子曰不有祝鮀之佞而有宋朝之美難乎免於今之世矣則不佞非無口辯而何洪慶善解論語魯人為長府閔子騫曰仍舊貫如之何何必改作子曰夫人不言言必有中謂魯因子騫一言遂不作長府以春秋不書知之也春秋雖不書然左氏傳昭公二十五年魯欲遂季氏而昭公居於長府則是魯已嘗作長府非因子騫一言而不作慶善失之矣慶善又云長如字今人多作上聲讀然左氏傳長府長字無音則論語當作如字無疑蔡邕石經論語云是魯孔丘歟曰是曰是知津矣今本論語于曰是下卻多一也字多秖二字通用語云多見其不知量也一本多作秖余固疑之後觀服䖍解左氏傳秖見疏也云晉宋杜本秖字皆作多又張衡西京賦云炙炰夥清酤多皇恩溥洪德施案文選西京賦作清酤㩼注廣雅曰多也此即引為多字恐誤何晏景福殿賦云赩如宛虹赫如奔螭南岠陽滎北極幽崖任重道逺厥庸孔多二多字如此押益知多秖二字古通用無疑韻略送字韻内閧字音胡貢切注云鬭聲彼謂孟子鄒與魯閧註作鬬聲故如此説然閧字之義初不是鬬聲也夫孟子所謂鬨者乃鬨字亦音胡貢切此鬨字乃鬭聲爾今人言治行二字葢出于漢書鄭當時傳云使視決河自請治行五日亦孟子所謂治任之意歟孟子云異於白馬之白也無以異於白人之白也余謂異於白之下當用一㸃下句之首仍添一白字當作異於白白馬之白也無以異於白人之白也下白字疑脱誤致然今復添一白字然後其意始明矣甕牖閒評卷一
