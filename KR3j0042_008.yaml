body:
  text: 甕牖閒評卷八宋袁文撰漢時尚布席而坐故竇嬰行酒而坐客半膝席所謂半膝席者乃今之跪膝也惟席上乃可跪膝他處則不可以是知戴憑重席管寧割席莫非布席而坐也今人託附書每云不至浮沉晉殷羡作豫章太守臨去都下人因寄百許函書羡至石頭悉擲水中曰沉者自沉浮者自浮浮沉蓋起于此也王羲之東牀坦腹所謂東牀者乃繩牀之牀非牀榻之牀也人多以其坦腹誤認牀榻之牀豈繩牀之上獨不容坦腹耶黄太史題王右軍所繪圖云余觀此榻上偃蹇者定不能書蘭亭序也是又誤以為牀榻之牀矣唐劉洎少時嘗遇異人謂之曰君當佐太平須謹磨兜堅之戒穀城國門外有石人刻其腹曰磨兜堅慎勿言故云逮京口新第成大㕔照壁用楮糊大書家語周廟三緘銘背之戒深戒子孫慎言此事載蘇魏公談訓可謂知所警戒矣其後太宗俾之輔太子太宗曰我今遠征爾輔太子安危所寄宜深識我意洎對曰願陛下無憂大臣有罪者臣謹即行誅太宗以其言妄乃曰卿性疎而太健必以此敗後太宗不豫洎從内出色甚悲或譖之曰洎言國家事不足憂但當輔幼主行伊霍故事大臣有異志者誅之自定矣太宗以其言與疇昔同大怒遂酷信不疑于是下詔賜自盡夫異人者知洎必以言死故戒之洎亦非不防慎然其後竟以言死嗚呼豈非命也夫内宴優伶打渾惟御史大夫不預蓋始于唐李栖筠也至今遂以為法不知用妓樂而教官不預復起于何時其亦有所據耶重瞳未必皆佳也史記載舜目蓋重瞳子項羽亦重瞳子成否槩可知矣五代時李後主煜一目有重瞳後竟歸朝以死其後建州一老僧卓嵓明兩目皆重瞳内臣李義聞之強為推戴既而為義所殺亦自無其福也宋齊丘之死僧文瑩玊壺清話云齊丘少夢乘龍上天至垂老猶存狂望當國家發難尚欲因釁以窺覬時年七十三矣事敗囚于家鑿土坎穿竇以給食因而縊焉鄭工部南唐近事云齊丘登相位數歲致仕復以大司徒就徴保大末坐陳覺謀叛餓死青陽二書不同如此未知孰是也往時科塲例寛試官有在簾下看舉子作文者故傳三條燭盡燒殘舉子之心八韻賦成驚破試官之膽之語但塲中不許見燭豈有試官自謂三條燭盡之理此蓋五代夜試時事也五代時竇貞固謂晝短舉子文字難了因請夜試許用三條燭故韋貽永詩云三條燭盡鐘初動九轉丹成鼎未開此亦夜試之詩于此可見矣太祖北征至陳橋為三軍推戴而囘方其未行也羣公祖道于芳林園陶穀堅欲致拜且曰囘來難為揖酌也則此事當時已知之矣萬一别有變將如之何何不謹密如此嘗觀王禹偁所撰建隆遺事載立晉王一節皆太祖之心自欲如此初非出于杜太后也前一段云太祖欲立太宗議已定太后遂令趙普作誓書留之禁中既而太宗即位後一段云太祖將晏駕方召趙普于寢閣及趙普欲立太祖之子而太祖不允遂立太宗其後太宗聞之故與普有隙夫以書中前後所載一事乃不同如此何耶今州縣戒石銘云爾俸爾禄民膏民脂下民易虐上天難欺此太宗取孟昶戒百官文切于事情者使刋之州縣庭下庶守令朝夕常在目前而不忘戒懼耳亦可見愛民之切也或者于每一句下各添一句云爾俸爾禄只是不足民膏民脂轉喫轉肥下民易虐來的便著上天難欺他又怎知其無狀有如此者盧多遜善取媚人主以希進用國初為參知政事太祖常令館中取書多遜豫戒主書吏立白之即通夕覽讀明日太祖指問書中事同列罔措多遜應答如響此即丁謂之從駕東封回眞宗欲幸孔子廟謂于前一日先往廟中省視饌具因詢其事務以備明日顧問其用意政相類也大抵姦人作事皆然自以為一己之能萬一人主見喜則超躐奮迅何事不可為彼安分守己恬于進取者方且以道義自居其肯如此僥倖乎舊傳丁謂用事一日魯肅簡公以公事造其第魯方拜起丁曰學士拜時鬚撇地魯應之曰相公坐處幕漫天隱須撇地莫漫天耳須撇地者丁欲魯之從已使勿遲疑也莫漫天者魯亦譏之之言也太祖取南唐年餘始得之怒其不歸朝及來降則命為違命侯蓋惡號也後二年方改封為隴西郡公及殁乃贈太師諡吴王夫歐陽公吉州人政屬有唐其祖父皆南唐之臣則後主其故主也歐陽公作五代史及集古録至説後主處每指為違命侯寧忍稱其惡號乎且陳夀作三國志其于孫權直以名呼之至蜀則必曰先主後主蓋夀本蜀人以父母之邦其言不得不爾豈謂歐陽公識鑒如此而獨不為之諱何也景徳祥符之間陳堯叟諸人造作天書符瑞以為固寵容悦王子明為宰相心知得罪于清議而固寵患失不能決去及臨終乃欲削髮僧服以歛何所補哉子明諡曰文正堯叟諡曰文忠二公謂之忠正可乎今人見魁偉人便以為發過甚不然也觀聞見前録載富韓公方為舉子時與士人魏叔平段希元并一張姓者同于上東門裏福先寺之門上觀王冀公尹洛振車騎入城富公魁偉三人者挽之以登見其旌節導從之盛嘆曰王公亦舉子耶其後富公當朝著功立業何趐王冀公方為舉子時卻未嘗不魁偉如此也青城蓋為郊祀設也其間宫室苑囿亭榭前代皆結綵為之無不畢備頗亦華麗至宣和中始眞以瓦石為宫室宏壯擬于宸極後金人之來正據青城二聖北狩由此若有以使之者焉今所謂衙喏者蓋牙喏也當用此牙字古者太守出㕔則建牙牙者牙旗也建牙以表太守出㕔耳于是兵卒鳴鼓而聲喏每日早晏皆然故謂之早牙晩牙今時則不然每至申牌太守初不出㕔亦未嘗建牙州郡兵卒皆鳴鼓而聲喏謂之衙喏殊不曉所謂不獨州郡如此其他曹職處往往皆然蓋前後循習不究所由來耳秦始皇初即位漢髙祖以是年生梁武帝殺東昏侯覆齊祚而侯景亦以是年生隂極陽生陽極隂生之理詎不信耶古之制刑不妄皆與其罪從類漢法犯淫坐宫刑是也而隂府之法亦然若夷堅志所謂姦人妻者以絶嗣報姦人室女者以子孫淫佚報亦豈不與罪從類乎太祖初即位李筠將叛而患錢糧缺少乃以情喻僧曰吾軍府用不足欲借師之名以足之吾為師作維那教化錢糧各三十萬且寄我倉庫事畢之日中分之僧許諾乃令積薪坐其上尅日自焚筠為穿地道于其下令通府中曰至日走歸府中足矣筠遂與夫人先往傾家財盡施之于是逺近爭以錢糧饋之四方輻輳倉庫不能容旬日錢糧六十萬俱足筠乃塞其地道焚僧殺之盡取其錢糧遂叛人皆謂筠之智略及此而不知此唐李抱眞鎮潞州時謀也其事載之尚書故實筠知之于是用此䇿噫古人謂殺一不辜而得天下不為也抱眞誘一僧無故而殺之取其錢糧以濟軍旅可乎然抱眞之心本為國也其罪猶可恕若筠者以謀逆節亦誘一僧殺之無難色雖得財貨不貲使彼受無窮之苦乃欲濟吾事乎未㡬太祖親征筠不免赴火而死一家屠戮宜其得是報也余自㓜聞欽宗乃喆和尚後身獨未知何所據耳近觀國史後補見惠恭王皇后初懐姙夢宣徳正門大啟有兩紅旗各書一吉字以入是生欽宗兩吉字乃喆字也則知欽宗乃喆和尚後身無疑其後徽宗立為皇太子梁師成奏曰臣屢令術者攷東宫命不乆矣正謂欽宗也是時師成欲改立鄆王固有為而然然欽宗在位止一年遂有北狩之事術者之言亦信矣夫喆和尚徽宗朝人也既死米元章為之書行業碑余嘗見之眞有道徳者復出為帝王而有天下亦可謂福矣而在位乃不乆悲夫政和中明逹皇后薨後王老志到京師能知未來事徽宗嘗遣使問曰今明逹在何處老志云明逹乃上眞紫虗元君余初不以為然及攷明逹行事誠覺有異人處嘗植芭蕉于庭曰是物長吾不見矣臨終顧謂侍者曰鬼道易耶仙道易因叩齒再三而逝非了死生者能若是乎此與春渚紀聞所載看經劉娘子既死而香馥襲人面色如生者一也上眞紫虗元君之對當不妄矣徽宗明節皇后初入侍昭懐既而得罪出居于何訢家訢遇之無禮暨貴凡訢之黨悉䧟而殺之後寢疾見所䧟者為祟而薨此國史後補所載也而春渚紀聞又云明節在徽宗朝有一小宫嬪微迕上㫖潛求救于明節既許諾矣反從而下石小宫嬪自經死而明節亦薨方舉衾忽其首已斷旋轉于地視之則羣蛆聚擁穢氣不可近余謂此二事自足以殺其軀矣然明節為林靈素所諛乃以為九華玊眞安妃每神霄降必别寘妃位圖肖妃象列于帝君之左誣衊上聖如此其能免于惡疾之死乎自秦漢以來一百三十六帝惟梁武帝得八十三歲本朝髙宗聖算登八十一若梁武帝夀數雖髙遭侯景之亂狼狽而死又何足貴耶惟髙宗當天下承平之時其年尚未及六十乃以萬機之務盡付之夀皇方且陶冶聖性恬養道眞所樂者文章琴棊書畫而已其他子女之奉聲色之娱初未嘗留意焉此所以五福兼全獨過八旬之夀自秦漢以來一人而已茍非胸中有大過人者能至此乎然則庸常之人其可以情欲累其身哉泊宅編載宗澤初為館陶尉每獲逃軍即殺之邑境為之無盜呂吉甫嘗戒之曰此雖除盜之䇿恨子未曽觀佛書人命難得不可妄殺況國有常刑乎其後澤子五人三人既已顯官皆死于澤前未必非妄殺之報也泊宅編載范居簡初欲買宅或云中有怪不可居試使諸僕宿于堂廡伺之每夕但見一物人首而蛇身往來其間不甚畏人諸僕相與謀以卧具裹之束縛就烹其怪遂絶或云此喪門也而明道雜志亦載楊國寳嘗謂張文潛云我夜夢一蛇首有冠文潛素聞蛇身有冠謂之喪門已而果驗又田京待制將取幞頭戴之有蛇出幞頭下或云蛇戴幞頭喪門也不數日京死豈不為怪事歟然前之喪門乃禿頭者而今又戴冠與幞頭其喪門亦有等級耶此物自有人即有之但不知未有冠與幞頭時其所戴者何物抑亦禿頭者不為怪必待戴冠與幞頭始解興災或未可知也蘇東坡嘗夜夢登合江樓月色如水韓魏公跨鶴來曰被命同領劇曹故來相報他日北歸中原當不乆也此事見仇池筆記中東坡以建中靖國元年遇赦北歸七月到常州而竟殂于錢公輔家此亦異事也歟嶺南無雪大觀庚寅歲忽有之寒氣太盛雖嶺南地煖莫能勝也此乃北方兵起之兆後遂有靖康之變歐陽文忠公云唐人宴聚盛傳葉子格五代國初猶然後漸廢不傳此盖李唐時讖語宜其乆而遂冺也夫葉子二字拆葉字上一半乃廿世字餘木字湊下子字作李字乃廿世李正合有唐歴代二十帝之數當時讖語如此而謂非天命可乎張士遜年七十有八詩云八十光隂有二年煙蘿門戸喜開關近來無奈山中相頻寄書來許綴班後四年而卒乃八十二歲之讖此詩史所載也而避暑録話乃云士遜致仕年八十六恐誤詩有讖果然王逢原少有俊材荆公酷愛之然官竟不顯夀亦止于二十九觀其作孤雲詩云旁人莫道能為雨惟恨青山未得歸其官之不顯可知矣作送周秀才詩云為語青山幸相望壯夫終不白頭歸其夀之不長又可知矣蔡京三子長曰攸次曰翛次曰鯈當時語云蔡京之後尤蕭條不為無讖兆也欽宗實録載王黼聞欽宗即位震駭亟入賀欽宗先諭閤門使勿納貶為崇信軍節度副使永州安置既而籍其家賜死于負國村而泊宅編乃云宣和七年駕幸龍徳宫黼獻詩有巧將千嶂遮晴日借得三眠作翠幃識者指以為讖謂黼不復見君矣夫欽宗即位之初既不許黼入殿門如何卻得從駕至龍徳宫而又獻詩耶此事恐未必然特當時附㑹云爾余鄉楊漢卿作堂王文煥檢正榜之曰夀豈取詩所謂令徳夀豈者託先父懇鄭國材書既上榜未㡬王楊鄭與先父偕亡盖愷字不合依詩作豈字遂成夭折之讖楊為主人禍福固有之其三人者亦俱不免此則異事也耶余在江隂時報恩主僧退院遂議别請一僧一夕偶夢接新長老方對揖間若有人在側曰卻與長者同歲覺而識之因語諸孫曰此豈異耶俄而長老相見問其年果然嘗謂人之夢兆日中每經心者夜或形之如長老事初未嘗經心而應驗如此殊不可曉豈亦有所謂讖者在其中耶先祖母石氏一日忽苦臂疼是時先祖知隨州請醫命藥無所不至其臂疼日甚殆不能堪也先父于是發心修佛凡一城之内佛像有手足不完者皆修之所費極不貲工未畢而臂疾頓除安貼如平時嗟夫非至誠而能若是乎孟子曰不誠未有能動者也惟先父一念至誠遂能上動神明而報應之速如此則天下之事其有可以不誠者耶先父暮年多病他無所冀獨責望余兄弟兩人不淺觀其賦紅梅花詩云雖云誤失風霜操不替調羮為子賢槩可見矣余家自建炎來稍衰先父思有以大門庭則惟以教子為急擇得一劉先生名宏字彦博命余兄弟師之自入學後未嘗三日無饋遺敬禮倍至余不肖不足承先父志稍幸舍弟成名從官二十年得改秩榮封叙時先父捐館已乆鄉人皆太息知其至誠之所感也余雖無所成就而舍弟及弟二子所以相繼科名其他諸子亦有預薦名者可不知所本歟故敬書之俾後世子孫知先父用心如此又知有子不可不教而待先生之禮尤不可不忠且敬也春渚紀聞載張大亨家嘗有人相其墓云公家遇牛年當有登第者既而大亨父公著熙寧癸丑年登第大亨元豐乙丑年登第大亨之兄大成大觀己丑年登第大亨之弟大受宣和辛丑年登第此亦異事也余家亦頗類此舍弟某乾道己丑年登第舍弟二子某淳熙辛丑年登第則豈得不為異事耶抑亦先父之墓有少吉徴如張氏者歟恨未得善相者觀之然余今三子猶在布衣而二子已預薦名未審向後當癸丑年能復有登第者乎若以張氏較之殆未易繼述也余少時見家中一瓦硯頭有一品字多將其背試金後因擾攘遂失所在及觀蘓東坡集方知澤州金道人澄泥硯與家中瓦硯正同盖是時好物易得故不甚愛惜使今日尚在豈不為吾家之寳其忍棄之耶余有一小端硯銘紫雲取翰林志中所謂一段紫雲略無㸃綴者也又有一小歙硯銘蒼璧取東坡詩中所謂君家石硯蒼璧橢而䨟與夫開鵠卵見蒼璧者也余淳熙十五年四月初大病忽夢身上截為水所浸下截則埋在土中覺後甚以為不祥既而思之是夜天氣猶寒上截偶失盖覆而身冷故如為水所浸下截有衾故如在土中于是豁然不疑而病亦自此少安乃知夢者初不足憑在人消息之耳余向欲鑿一池種荷花築小亭其上榜曰雲錦取蘓東坡詩中捲卻天機雲錦段雲錦二字極佳本出韓退之詩云撐舟昆明度雲錦東坡愛此二字故于和文洋州三十絶中用之今余老不事事竟不能榜之于亭未嘗不惋恨在江隂時見曹氏新闢一堂植荷花滿池已榜為清香余偶道及前二字答曰請易之既而余歸亦未知其果易否蘓東坡詩云果熟多幽欣余自少即喜幽欣二字意欲植少果樹于中作一小亭以幽欣名今老矣此志不遂奈何余又欲名小室為盤蝸取黄太史詩云一室可盤蝸也自古藏冰盖有用也見于周禮并詩至本朝始藏雪唐髙宗朝方士明崇儼取以進云自山隂得來盖是時未知藏雪也今余鄉亦能藏雪見説初無甚難藏雪之處其中亦可藏酒及柤梨橘柚諸果乆為寒氣所浸夏取出光彩燦然如新而酒尤香冽余性喜食果近得此方可以娱老若酒則非余所嗜也唐彦猷酷愛書畫等物嘗謂蔡君謨曰告老之後屏居以絶世事茍非此何以寓適哉後月餘彦猷染疾竟卒余老矣平生無所嗜好獨于書畫頗亦拳拳焉故于所居之東偏闢一小軒榜曰臥雪每日徜徉其中自讀書作字之外則取古書畫展玩披覽未嘗輒去手雖徳望之尊爵位之崇去彦猷逺甚然吾之樂乃彦猷欲為而不可得者顧不為厚幸歟古詩云老知書畫眞有益非過論也前輩評詩謂老覺腰金重慵便玊枕涼此享富貴者也又詩云笙歌歸院落燈火下樓臺此看人富貴者也余自少好學至老不衰不幸命有所制卒無所成就良可嘆惋暮年乃苦心虗之疾竟夕未能得少安跧伏陋巷恍如燭在風中惟懼其滅也雖欲看人富貴不可得況享富貴乎幸而諸子稍自立僅免饘粥之缺抑命之使然不然塡于溝壑矣王老志將死有衣六七襲悉封還素所遺之者王直方病革凡所蓄書畫悉分與平日相知二公可謂逹矣夫衣物書畫在世已為贅疣況死後復何用耶余老矣且家素貧無他嗜好止有些小書畫衣物他時亦當分與親識之貧者俾全無掛慮身後即空矣古詩云而今身畔全無物豈不快意也哉甕牖閒評卷八
